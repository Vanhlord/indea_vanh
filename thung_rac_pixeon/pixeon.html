<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixeon V2 - Canvas Cấp Thương Mại</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; user-select: none;
            background-image: radial-gradient(circle at 50% 50%, #1f2833 0%, #0b0c10 100%);
        }

        #board {
            display: block; width: 100%; height: 100%;
            cursor: crosshair;
            /* Disable anti-aliasing for pure pixel look */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* Premium Glass UI */
        .glass-panel {
            background: rgba(15, 20, 25, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 16px;
        }

        .ui-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 20px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            z-index: 10; width: 90%; max-width: 480px;
        }

        .palette {
            display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
        }

        .color-btn {
            width: 25px; height: 25px; border-radius: 6px;
            border: 2px solid rgba(255,255,255,0.1); cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        
        .color-btn:hover {
            transform: translateY(-4px) scale(1.1);
            box-shadow: 0 8px 15px rgba(0,0,0,0.6);
        }

        .color-btn.selected {
            border: 2px solid white;
            transform: translateY(-6px) scale(1.15);
            box-shadow: 0 0 20px rgba(255,255,255,0.7);
        }

        .controls { display: flex; gap: 10px; color: #a1a1aa; font-size: 12px; font-weight: 500; }
        .badge {
            background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 6px;
            font-variant-numeric: tabular-nums; border: 1px solid rgba(255,255,255,0.05);
        }

        .header { position: absolute; top: 15px; left: 15px; z-index: 10; pointer-events: none; }
        .header h1 {
            margin: 0; font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .header p { margin: 4px 0 0 0; color: #cbd5e1; font-size: 12px; font-weight: 500; }

        /* Cooldown Overlay */
        .cooldown-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            color: #f87171; font-weight: bold; font-size: 28px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8); backdrop-filter: blur(3px);
        }
        .cooldown-overlay.active { opacity: 1; pointer-events: all; }
        .cooldown-bar-container {
            position: absolute; bottom: 0; left: 0; height: 5px; width: 100%;
            background: rgba(255,255,255,0.1); border-radius: 0 0 16px 16px; overflow: hidden;
        }
        .cooldown-bar {
            height: 100%; background: #f87171; width: 100%;
            transform-origin: left; transition: transform 0.1s linear;
        }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0b0c10; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }
        .spinner {
            width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite;
        }
        .brush-controls {
            display: flex; align-items: center; gap: 10px; width: 100%; padding-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 5px;
        }
        .brush-slider {
            flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;
            appearance: none; outline: none; cursor: pointer;
        }
        .brush-slider::-webkit-slider-thumb {
            appearance: none; width: 12px; height: 12px; background: #667eea;
            border-radius: 50%; box-shadow: 0 0 10px rgba(102,126,234,0.5);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .ui-container { width: 95%; bottom: 10px; padding: 10px; gap: 8px; }
            .color-btn { width: 22px; height: 22px; border-radius: 4px; }
            .palette { gap: 4px; }
            .controls { font-size: 10px; gap: 6px; }
            .badge { padding: 4px 6px; }
            .header h1 { font-size: 20px; }
            .header p { display: none; } /* Hide helper text to save screen space */
            .header { top: 10px; left: 10px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h2 style="margin-top:25px; color:#f8fafc; font-weight:600;">Đang tải bản đồ độ phân giải cực cao...</h2>
        <p style="color:#94a3b8; margin-top:5px;">Hệ thống xử lý GPU đang khởi động</p>
    </div>

    <div class="header">
        <h1>Pixeon</h1>
        <p>Chuột trái: Vẽ | Chuột phải/Kéo: Di chuyển khung | Cuộn chuột: Thu/Phóng</p>
    </div>

    <canvas id="board"></canvas>

    <div class="ui-container glass-panel">
        <div class="brush-controls">
            <span style="color: #94a3b8; font-size: 11px;">Cọ:</span>
            <input type="range" id="brush-size" min="1" max="20" value="2" class="brush-slider">
            <span id="brush-val" style="color: #cbd5e1; font-size: 11px; min-width: 20px;">2px</span>
        </div>
        <div class="palette" id="palette"></div>
        <div class="controls">
            <div class="badge" id="coords">Tọa độ: 0, 0</div>
            <div class="badge" id="zoom">Kính lúp: 1x</div>
        </div>
        
        <div class="cooldown-overlay" id="cd-overlay">
            <span id="cd-text">Chờ 5s</span>
            <div class="cooldown-bar-container">
                <div class="cooldown-bar" id="cd-bar"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        const coordsDisplay = document.getElementById('coords');
        const zoomDisplay = document.getElementById('zoom');
        const paletteContainer = document.getElementById('palette');
        const cdOverlay = document.getElementById('cd-overlay');
        const cdText = document.getElementById('cd-text');
        const cdBar = document.getElementById('cd-bar');
        const brushSlider = document.getElementById('brush-size');
        const brushValLabel = document.getElementById('brush-val');

        // Offscreen Canvas LOD System (Mipmapping)
        // LOD0: Full resolution (1000x1000)
        // LOD1: 2x Compressed (500x500)
        // LOD2: 4x Compressed (250x250)
        const lods = [
            { canvas: document.createElement('canvas'), scale: 1, size: 1000 },
            { canvas: document.createElement('canvas'), scale: 0.5, size: 500 },
            { canvas: document.createElement('canvas'), scale: 0.25, size: 250 }
        ];

        let GRID_SIZE_W = 1000;
        let GRID_SIZE_H = 1000;

        lods.forEach(lod => {
            lod.ctx = lod.canvas.getContext('2d', { alpha: false });
            lod.canvas.width = lod.canvas.height = lod.size;
            lod.ctx.fillStyle = '#ffffff';
            lod.ctx.fillRect(0, 0, lod.size, lod.size);
        });

        const offCanvas = lods[0].canvas; // backward compatibility
        const offCtx = lods[0].ctx;

        let scale = 1;
        let dx = 0; let dy = 0;

        const colors = [
            '#ffffff', '#e4e4e4', '#888888', '#222222', '#ffa7d1', '#e50000', 
            '#e59500', '#a06a42', '#e5d900', '#94e044', '#02be01', '#00e5f0', 
            '#0083c7', '#0000ea', '#e04aff', '#820080'
        ];
        
        let selectedColor = colors[5]; // Default Red
        let isPanning = false, isDrawing = false;
        let startX = 0, startY = 0, pannedX = 0, pannedY = 0;

        // Cooldown vars
        let isCooldown = false;
        let cooldownEndTime = 0;
        let cooldownTotalMs = 0;
        let cdInterval = null;

        // Zoom Snapping & Smooth Glide
        const ZOOM_LEVELS = [0.1, 0.25, 0.5, 1, 2, 4, 8, 16, 32, 64];
        let currentZoomIndex = 3; // Start at 1x
        let targetScale = scale;
        let targetDx = dx;
        let targetDy = dy;
        let isAnimating = false;

        // Whiteboard Props
        let lastX = null, lastY = null;
        let brushSize = 2; // Default stroke size

        const socket = io('/pixeon');

        brushSlider.addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            brushValLabel.innerText = `${brushSize}px`;
        });

        socket.on('config', (cfg) => {
            if(cfg.width && offCanvas.width !== cfg.width) GRID_SIZE_W = offCanvas.width = cfg.width;
            if(cfg.height && offCanvas.height !== cfg.height) GRID_SIZE_H = offCanvas.height = cfg.height;
            if(cfg.cooldownMs) cooldownTotalMs = cfg.cooldownMs;
        });

        // Load PNG map
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        img.onload = () => {
            // Draw into all LOD levels
            lods.forEach(lod => {
                lod.ctx.drawImage(img, 0, 0, GRID_SIZE_W, GRID_SIZE_H, 0, 0, lod.size, lod.size);
            });
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            
            // Auto fit map on start
            targetScale = scale = Math.min(window.innerWidth / GRID_SIZE_W, window.innerHeight / GRID_SIZE_H) * 0.95;
            if(scale < 0.3) targetScale = scale = 0.3;
            targetDx = dx = (window.innerWidth - GRID_SIZE_W * scale) / 2;
            targetDy = dy = (window.innerHeight - GRID_SIZE_H * scale) / 2;
            
            render();
        };
        img.onerror = () => {
            // fallback if failing to fetch PNG
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            console.error("Map failed to load or PNG API missing.");
            render();
        };
        // cache bypass hook
        img.src = '/api/pixeon/board.png?t=' + Date.now();

        function initPalette() {
            colors.forEach(color => {
                const btn = document.createElement('div');
                btn.className = 'color-btn';
                btn.style.backgroundColor = color;
                if (color === selectedColor) btn.classList.add('selected');
                
                btn.onclick = () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedColor = color;
                };
                
                paletteContainer.appendChild(btn);
            });
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = false;
            render();
        }
        window.addEventListener('resize', resize);

        // Smooth Panning and Glide Loop
        function animate() {
            const lerpFactor = 0.15; // Animation speed
            
            // Lerp scale
            const ds = targetScale - scale;
            if (Math.abs(ds) > 0.001) {
                scale += ds * lerpFactor;
                isAnimating = true;
            } else {
                scale = targetScale;
            }

            // Lerp position
            const dpx = targetDx - dx;
            const dpy = targetDy - dy;
            if (Math.abs(dpx) > 0.1 || Math.abs(dpy) > 0.1) {
                dx += dpx * lerpFactor;
                dy += dpy * lerpFactor;
                isAnimating = true;
            } else {
                dx = targetDx;
                dy = targetDy;
            }

            if (isAnimating) {
                render();
                // continue until settled 
                if (Math.abs(ds) < 0.001 && Math.abs(dpx) < 0.1 && Math.abs(dpy) < 0.1) {
                    isAnimating = false;
                } else {
                    requestAnimationFrame(animate);
                }
            }
        }

        function triggerAnimation() {
            if (!isAnimating) {
                isAnimating = true;
                requestAnimationFrame(animate);
            }
        }

        function render() {
            // Smart Image Smoothing:
            // Khử răng cưa (Moiré) khi thu nhỏ, nhưng giữ góc cạnh gắt gỏng khi phóng to
            ctx.imageSmoothingEnabled = scale < 1.0 ? true : false;
            
            // bg
            ctx.fillStyle = '#0b0c10';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(dx, dy);
            ctx.scale(scale, scale);

            // Select LOD based on scale
            let sourceLOD = lods[0]; // Full res default
            if (scale < 0.3) {
                sourceLOD = lods[2]; // Use 250x250
            } else if (scale < 0.6) {
                sourceLOD = lods[1]; // Use 500x500
            }

            // GPU-accelerated drawing from the chosen LOD canvas
            const drawSize = GRID_SIZE_W; 
            ctx.drawImage(sourceLOD.canvas, 0, 0, sourceLOD.size, sourceLOD.size, 0, 0, drawSize, drawSize);

            // Outer boundary
            ctx.lineWidth = 1 / scale;
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.strokeRect(0, 0, GRID_SIZE_W, GRID_SIZE_H);

            ctx.restore();
            
            // UI text
            zoomDisplay.innerText = `Kính lúp: ${(scale).toFixed(1)}x`;
            
            if (!isPanning) {
                canvas.style.cursor = scale <= 1.0 ? 'not-allowed' : 'crosshair';
            }
        }

        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left - dx;
            const mouseY = e.clientY - rect.top - dy;
            const lgX = Math.floor(mouseX / scale);
            const lgY = Math.floor(mouseY / scale);
            return { x: lgX, y: lgY };
        }

        function startCooldown() {
            if (cooldownTotalMs <= 0) return;
            isCooldown = true;
            cooldownEndTime = Date.now() + cooldownTotalMs;
            cdOverlay.classList.add('active');
            
            if(cdInterval) clearInterval(cdInterval);
            
            cdInterval = setInterval(() => {
                const remain = cooldownEndTime - Date.now();
                if (remain <= 0) {
                    clearInterval(cdInterval);
                    isCooldown = false;
                    cdOverlay.classList.remove('active');
                    return;
                }
                cdText.innerText = `Chờ ${(remain/1000).toFixed(1)}s`;
                const pct = (remain / cooldownTotalMs);
                cdBar.style.transform = `scaleX(${pct})`;
            }, 50);
        }

        function drawSegment(x1, y1, x2, y2, color) {
            lods.forEach(lod => {
                lod.ctx.strokeStyle = color;
                lod.ctx.lineCap = 'round';
                lod.ctx.lineJoin = 'round';
                lod.ctx.lineWidth = Math.max(1, brushSize * lod.scale);
                
                lod.ctx.beginPath();
                lod.ctx.moveTo(x1 * lod.scale, y1 * lod.scale);
                lod.ctx.lineTo(x2 * lod.scale, y2 * lod.scale);
                lod.ctx.stroke();
            });
        }

        function placePixel(e) {
            if (isCooldown) return;

            const pos = getGridPos(e);
            if (pos.x >= 0 && pos.x < GRID_SIZE_W && pos.y >= 0 && pos.y < GRID_SIZE_H) {
                const colorId = colors.indexOf(selectedColor);
                if (colorId !== -1) {
                    const startX = (lastX === null) ? pos.x : lastX;
                    const startY = (lastY === null) ? pos.y : lastY;

                    // Predictive Draw
                    drawSegment(startX, startY, pos.x, pos.y, selectedColor);

                    // Binary payload ArrayBuffer(9): [x1:u16, y1:u16, x2:u16, y2:u16, colorId:u8]
                    const buf = new ArrayBuffer(9);
                    const view = new DataView(buf);
                    view.setUint16(0, Math.floor(startX), true);
                    view.setUint16(2, Math.floor(startY), true);
                    view.setUint16(4, Math.floor(pos.x), true);
                    view.setUint16(6, Math.floor(pos.y), true);
                    view.setUint8(8, colorId);
                    socket.emit('p', buf);
                    
                    lastX = pos.x;
                    lastY = pos.y;

                    startCooldown();
                    render();
                }
            }
        }

        // Binary Live Events (9-byte Segments)
        socket.on('b', (buf) => {
            if (buf instanceof ArrayBuffer && buf.byteLength === 9) {
                const view = new DataView(buf);
                const x1 = view.getUint16(0, true);
                const y1 = view.getUint16(2, true);
                const x2 = view.getUint16(4, true);
                const y2 = view.getUint16(6, true);
                const cid = view.getUint8(8);
                if (colors[cid]) {
                    drawSegment(x1, y1, x2, y2, colors[cid]);
                    requestAnimationFrame(render);
                }
            }
        });

        // Revert event (simplified: just redo segment at end point if rejected)
        socket.on('r', (buf) => {
            if (buf instanceof ArrayBuffer && buf.byteLength === 9) {
                const view = new DataView(buf);
                const x2 = view.getUint16(4, true);
                const y2 = view.getUint16(6, true);
                const cid = view.getUint8(8);
                if (colors[cid]) {
                    // Update the offscreen pixels to correct state at the end point
                    lods.forEach(lod => {
                        lod.ctx.fillStyle = colors[cid];
                        const lx = Math.floor(x2 * lod.scale);
                        const ly = Math.floor(y2 * lod.scale);
                        lod.ctx.fillRect(lx, ly, 1, 1);
                    });
                    requestAnimationFrame(render);
                }
            }
        });

        socket.on('cooldown_error', (data) => {
            // Server rejected, apply the correct actual cooldown
            isCooldown = true;
            cooldownEndTime = Date.now() + (data.remain || cooldownTotalMs);
            cdOverlay.classList.add('active');
        });

        // Event listeners
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Find current closest zoom level to prevent "floating" states
            let closest = 0;
            let minDist = Infinity;
            ZOOM_LEVELS.forEach((z, i) => {
                if (Math.abs(z - targetScale) < minDist) {
                    minDist = Math.abs(z - targetScale);
                    closest = i;
                }
            });
            currentZoomIndex = closest;

            if (e.deltaY < 0) {
                currentZoomIndex = Math.min(currentZoomIndex + 1, ZOOM_LEVELS.length - 1);
            } else {
                currentZoomIndex = Math.max(currentZoomIndex - 1, 0);
            }

            const newScale = ZOOM_LEVELS[currentZoomIndex];
            const actualZoomFactor = newScale / targetScale;

            targetDx = mouseX - (mouseX - targetDx) * actualZoomFactor;
            targetDy = mouseY - (mouseY - targetDy) * actualZoomFactor;
            targetScale = newScale;

            triggerAnimation();
        }, { passive: false });

        // --- Touch Events for Mobile --- //
        let initialPinchDistance = null;
        let pinchStartScale = 1;

        canvas.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                isPanning = true;
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                pannedX = targetDx;
                pannedY = targetDy;
            } else if (e.touches.length === 2) {
                isPanning = false;
                pinchStartScale = targetScale;
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); 
            if (e.touches.length === 1 && isPanning) {
                targetDx = pannedX + (e.touches[0].clientX - startX);
                targetDy = pannedY + (e.touches[0].clientY - startY);
                
                const pos = getGridPos({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
                if (pos.x >= 0 && pos.x < GRID_SIZE_W && pos.y >= 0 && pos.y < GRID_SIZE_H) {
                    coordsDisplay.innerText = `Tọa độ: ${pos.x}, ${pos.y}`;
                }
                triggerAnimation();
            } else if (e.touches.length === 2) {
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                if (initialPinchDistance) {
                    const pinchFactor = currentDistance / initialPinchDistance;
                    let tentativeScale = pinchStartScale * pinchFactor;
                    
                    // Check if we hit a threshold to snap to next zoom level
                    let snapIdx = 0;
                    let minDist = Infinity;
                    ZOOM_LEVELS.forEach((z, i) => {
                        if (Math.abs(z - tentativeScale) < minDist) {
                            minDist = Math.abs(z - tentativeScale);
                            snapIdx = i;
                        }
                    });

                    if (ZOOM_LEVELS[snapIdx] !== targetScale) {
                        const newScale = ZOOM_LEVELS[snapIdx];
                        const actualZoomFactor = newScale / targetScale;
                        const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                        const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                        targetDx = centerX - (centerX - targetDx) * actualZoomFactor;
                        targetDy = centerY - (centerY - targetDy) * actualZoomFactor;
                        targetScale = newScale;
                        triggerAnimation();
                    }
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            if (e.changedTouches.length === 1 && e.touches.length === 0) {
                const dist = Math.hypot(e.changedTouches[0].clientX - startX, e.changedTouches[0].clientY - startY);
                if (dist < 10 && !isCooldown) {
                    placePixel({ clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY });
                }
            }
            initialPinchDistance = null;
            isPanning = false;
            lastX = lastY = null;
        });

        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) {
                isDrawing = true;
                lastX = lastY = null; // start of stroke
                placePixel(e);
            } else if (e.button === 2 || e.button === 1) { 
                isPanning = true;
                startX = e.clientX;
                startY = e.clientY;
                pannedX = targetDx;
                pannedY = targetDy;
                canvas.style.cursor = 'grabbing';
            }
        });

        canvas.addEventListener('mousemove', e => {
            const pos = getGridPos(e);
            if (pos.x >= 0 && pos.x < GRID_SIZE_W && pos.y >= 0 && pos.y < GRID_SIZE_H) {
                coordsDisplay.innerText = `Tọa độ: ${pos.x}, ${pos.y}`;
            } else {
                coordsDisplay.innerText = `Ngoài lề`;
            }

            if (isPanning) {
                targetDx = pannedX + (e.clientX - startX);
                targetDy = pannedY + (e.clientY - startY);
                triggerAnimation();
            } else if (isDrawing && !isCooldown) {
                placePixel(e);
            }
        });

        window.addEventListener('mouseup', e => {
            isPanning = false;
            isDrawing = false;
            lastX = lastY = null; // end of stroke
            canvas.style.cursor = scale <= 1.0 ? 'crosshair' : 'crosshair';
        });

        initPalette();
        resize();
        render(); // render initial background

    </script>
</body>
</html>
