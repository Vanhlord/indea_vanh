<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cộng đồng VNA - Diễn đàn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --forum-nav-h: 0px; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #333; }
        .white-card { background: white; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .post-card { transition: all 0.3s ease; }
        .post-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .modal-overlay { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .like-btn.active { color: #ef4444; }
        .like-btn.active i { font-weight: 900; animation: heartBeat 0.3s ease-in-out; }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .comment-section { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-in-out; }
        .comment-section.open { max-height: 1000px; }
        .comment-parent-highlight { 
            animation: highlightGlow 2s ease-out;
            border-color: #22c55e !important;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }
        @keyframes highlightGlow {
            0% { background-color: #f0fdf4; border-color: #22c55e; }
            100% { background-color: white; border-color: #f1f5f9; }
        }
        #sidebar { top: var(--forum-nav-h); height: calc(100vh - var(--forum-nav-h)); }

        /* Utilities grid (rendered by shared-sidebar.js) */
        #sidebar .tool-grid-sidebar {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.55rem;
        }

        #sidebar .tool-tile {
            aspect-ratio: 1 / 1;
            border: 1px solid #dbe7ff;
            border-radius: 0.85rem;
            background: #f8fbff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #475569;
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.1;
            transition: all .2s ease;
            padding: 0.55rem;
        }

        #sidebar .tool-tile i {
            font-size: 1.1rem;
        }

        #sidebar .tool-tile:hover {
            background: #007bff;
            color: #ffffff;
            border-color: #007bff;
            transform: translateY(-1px);
        }

        #sidebar .tool-tile.is-active {
            background: #007bff;
            color: #ffffff;
            border-color: #007bff;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.16);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 px-4 md:px-6 py-3 md:py-4 flex items-center justify-between border-b border-gray-100">
        <div class="flex items-center space-x-2 md:space-x-3">
            <button type="button" onclick="toggleSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center bg-gray-50 rounded-lg border border-gray-200 text-gray-600">
                <i class="fas fa-bars"></i>
            </button>
            <div class="w-8 h-8 md:w-10 md:h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fas fa-users text-white text-sm md:text-xl"></i>
            </div>
            <span class="text-base md:text-xl font-bold tracking-tight text-gray-800">Cộng đồng VNA</span>
        </div>
        <div class="flex items-center space-x-2 md:space-x-4">
            <button id="createPostBtn" class="btn-primary p-2 md:px-4 md:py-2 rounded-lg font-semibold text-white text-xs md:text-sm flex items-center space-x-1 md:space-x-2">
                <i class="fas fa-plus"></i>
                <span class="hidden xs:inline">Đăng bài</span>
            </button>
            <div id="userProfile" class="flex items-center space-x-2 md:space-x-3 pl-2 md:pl-4 border-l border-gray-100">
                <span id="username" class="text-xs md:text-sm font-semibold text-gray-700 hidden sm:inline">Đang tải...</span>
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=U" class="w-7 h-7 md:w-8 md:h-8 rounded-full border border-gray-100 object-cover">
            </div>
        </div>
    </nav>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-[1000] hidden lg:hidden" onclick="toggleSidebar()"></div>

    <div class="flex flex-1">
        <aside id="sidebar" class="fixed lg:sticky w-[260px] bg-white border-r border-gray-200 transition-all duration-300 z-[1001] -left-[260px] lg:left-0 flex flex-col shadow-sm">
            <div class="flex items-center gap-3 p-5 border-b border-gray-100">
                <div class="w-9 h-9 bg-[#007bff] rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-100">
                    <i class="fas fa-users text-lg"></i>
                </div>
                <span class="text-lg font-bold tracking-tight text-slate-800">VNA</span>
            </div>

            <nav class="flex-1 overflow-y-auto p-5 space-y-2 text-sm">
                <!-- Sidebar content injected by shared-sidebar.js -->
            </nav>

            <div class="p-5 pt-4 border-t border-gray-100">
                <p class="text-xs text-gray-400 text-center font-medium">© 2026 VNA</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 container mx-auto max-w-5xl px-4 md:px-6 py-6 md:py-10">
            <!-- Header -->
            <div class="mb-8 md:mb-12 text-center">
                <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900 mb-2">Diễn đàn thảo luận 👋</h1>
                <p class="text-sm md:text-base text-gray-500">Nơi kết nối, chia sẻ kiến thức và tài nguyên.</p>
            </div>

            <!-- Post List -->
            <div id="postsContainer" class="grid grid-cols-1 gap-8">
                <!-- Loading State -->
                <div class="col-span-full py-20 text-center text-gray-400">
                    <i class="fas fa-spinner fa-spin text-4xl mb-4 text-blue-500"></i>
                    <p>Đang tải bài viết...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Post Modal -->
    <div id="createPostModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center modal-overlay p-4">
        <div class="bg-white w-full max-w-2xl rounded-2xl p-5 md:p-8 shadow-2xl animate-in fade-in zoom-in duration-300 overflow-y-auto max-h-[95vh] custom-scrollbar">
            <div class="flex items-center justify-between mb-6 md:mb-8">
                <h2 class="text-xl md:text-2xl font-bold text-gray-900">Tạo bài viết mới</h2>
                <button onclick="closeCreatePostModal()" class="text-gray-400 hover:text-gray-600 transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="postForm" class="space-y-4 md:space-y-6">
                <div>
                    <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Tiêu đề</label>
                    <input type="text" id="postTitle" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 md:py-3.5 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-gray-800 transition-all font-medium text-sm md:text-base" placeholder="Tiêu đề bài viết (tùy chọn)...">
                </div>
                <div>
                    <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Nội dung</label>
                    <textarea id="postContent" rows="5" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 md:py-3.5 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-gray-800 transition-all font-medium text-sm md:text-base" placeholder="Bạn đang nghĩ gì?"></textarea>
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <label class="block text-xs md:text-sm font-bold text-gray-700">Tệp đính kèm</label>
                        <div class="flex items-center space-x-4">
                            <button type="button" onclick="document.getElementById('libraryFileInput').click()" class="text-blue-600 hover:text-blue-700 text-xs md:text-sm font-bold flex items-center space-x-1.5 transition-colors">
                                <i class="fas fa-images"></i>
                                <span>Thư viện</span>
                            </button>
                            <button type="button" id="openCloudPickerBtn" class="text-blue-600 hover:text-blue-700 text-xs md:text-sm font-bold flex items-center space-x-1.5 transition-colors">
                                <i class="fas fa-cloud"></i>
                                <span>Chọn từ Cloud</span>
                            </button>
                        </div>
                    </div>
                    <input type="file" id="libraryFileInput" class="hidden" multiple accept="image/*,video/*,audio/*" onchange="handleLibraryFileSelect(event)">
                    <div id="attachmentsPreview" class="flex flex-wrap gap-2">
                        <!-- Attached files will appear here -->
                    </div>
                </div>

                <div class="flex items-start md:items-center justify-center md:justify-end space-x-4 pt-6 border-t border-gray-100 flex-col md:flex-row space-y-3 md:space-y-0">
                    <button type="button" onclick="closeCreatePostModal()" class="w-full md:w-auto px-6 py-2.5 rounded-xl font-bold text-gray-500 hover:text-gray-700 transition-colors text-sm order-2 md:order-1">Hủy bỏ</button>
                    <button type="submit" id="submitPostBtn" class="w-full md:w-auto btn-primary px-8 py-2.5 rounded-xl font-bold text-white shadow-lg shadow-blue-500/20 text-sm order-1 md:order-2">Đăng bài ngay</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Cloud Picker Modal -->
    <div id="cloudPickerModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center modal-overlay p-2 md:p-4">
        <div class="bg-white w-full max-w-3xl h-[90vh] md:h-[80vh] rounded-2xl md:rounded-3xl flex flex-col shadow-2xl border border-gray-200 overflow-hidden">
            <div class="flex items-center justify-between px-5 md:px-8 py-4 md:py-6 border-b border-gray-100">
                <h2 class="text-lg md:text-xl font-bold flex items-center space-x-2 text-gray-900">
                    <i class="fas fa-cloud text-blue-500"></i>
                    <span class="truncate">Chọn tệp từ Cloud</span>
                </h2>
                <button onclick="closeCloudPicker()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="px-5 md:px-8 py-3 bg-gray-50 flex items-center space-x-2 text-[10px] md:text-xs font-bold text-gray-500 overflow-x-auto whitespace-nowrap custom-scrollbar" id="pickerBreadcrumb">
                <!-- Breadcrumb -->
            </div>

            <div class="flex-grow overflow-y-auto px-4 md:px-6 py-4 md:py-6 custom-scrollbar" id="pickerFileList">
                <!-- Files will be listed here -->
            </div>

            <div class="px-5 md:px-8 py-4 md:py-5 border-t border-gray-100 flex flex-col sm:flex-row items-center justify-between bg-gray-50/50 gap-3">
                <div id="pickerSelectionInfo" class="text-xs md:text-sm font-bold text-blue-600 truncate max-w-full text-center sm:text-left">
                    Chưa chọn tệp nào
                </div>
                <div class="flex space-x-3 w-full sm:w-auto">
                    <button onclick="closeCloudPicker()" class="flex-1 sm:flex-none px-4 py-2.5 rounded-xl text-sm font-bold text-gray-500 hover:text-gray-700">Hủy</button>
                    <button id="confirmPickerBtn" class="flex-1 sm:flex-none btn-primary px-6 py-2.5 rounded-xl text-sm font-bold text-white opacity-50 cursor-not-allowed" disabled>Chọn</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Gallery Modal (vertical scroll, light theme) -->
    <div id="imageGalleryModal" class="fixed inset-0 z-[70] hidden opacity-0 transition-opacity duration-300 modal-overlay">
        <div class="absolute inset-0 flex flex-col">
            <div class="flex items-center justify-between px-4 md:px-6 py-4 border-b border-gray-100 bg-white/90 backdrop-blur-md">
                <div class="flex items-center space-x-3">
                    <div class="text-gray-900 font-bold text-sm md:text-base">Ảnh đính kèm</div>
                    <div id="galleryCounter" class="text-gray-600 text-xs md:text-sm font-semibold bg-gray-100 px-2.5 py-1 rounded-full">
                        0 ảnh
                    </div>
                </div>
                <button onclick="closeImageGallery()" class="text-gray-500 hover:text-gray-900 transition-colors p-2">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <div id="galleryScroll" class="flex-grow overflow-y-auto custom-scrollbar px-3 md:px-8 py-4 md:py-6">
                <div id="galleryList" class="max-w-4xl mx-auto space-y-4 md:space-y-6">
                    <!-- Images will render here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        function syncForumNavHeight() {
            const nav = document.querySelector('nav');
            if (!nav) return;
            const height = Math.round(nav.getBoundingClientRect().height || 0);
            document.documentElement.style.setProperty('--forum-nav-h', `${height}px`);
        }

        function toggleSidebar() {
            if (window.innerWidth >= 1024) return;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!sidebar || !overlay) return;
            const isOpen = sidebar.classList.contains('left-0');
            if (isOpen) {
                sidebar.classList.remove('left-0');
                sidebar.classList.add('-left-[260px]');
                overlay.classList.add('hidden');
                return;
            }
            sidebar.classList.add('left-0');
            sidebar.classList.remove('-left-[260px]');
            overlay.classList.remove('hidden');
        }

        function closeSidebar() {
            if (window.innerWidth >= 1024) return;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!sidebar || !overlay) return;
            sidebar.classList.remove('left-0');
            sidebar.classList.add('-left-[260px]');
            overlay.classList.add('hidden');
        }

        window.addEventListener('resize', () => {
            syncForumNavHeight();
            closeSidebar();
        });
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', syncForumNavHeight, { once: true });
        } else {
            syncForumNavHeight();
        }
    </script>
