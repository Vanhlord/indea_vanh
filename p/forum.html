<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cộng đồng VNA - Diễn đàn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --forum-nav-h: 0px; }
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #333; }
        .white-card { background: white; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .post-card { transition: all 0.3s ease; }
        .post-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        .modal-overlay { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .like-btn.active { color: #ef4444; }
        .like-btn.active i { font-weight: 900; animation: heartBeat 0.3s ease-in-out; }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .comment-section { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-in-out; }
        .comment-section.open { max-height: 1000px; }
        .comment-parent-highlight { 
            animation: highlightGlow 2s ease-out;
            border-color: #22c55e !important;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }
        @keyframes highlightGlow {
            0% { background-color: #f0fdf4; border-color: #22c55e; }
            100% { background-color: white; border-color: #f1f5f9; }
        }
        #sidebar { top: var(--forum-nav-h); height: calc(100vh - var(--forum-nav-h)); }

        /* Utilities grid (rendered by shared-sidebar.js) */
        #sidebar .tool-grid-sidebar {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.55rem;
        }

        #sidebar .tool-tile {
            aspect-ratio: 1 / 1;
            border: 1px solid #dbe7ff;
            border-radius: 0.85rem;
            background: #f8fbff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #475569;
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.1;
            transition: all .2s ease;
            padding: 0.55rem;
        }

        #sidebar .tool-tile i {
            font-size: 1.1rem;
        }

        #sidebar .tool-tile:hover {
            background: #007bff;
            color: #ffffff;
            border-color: #007bff;
            transform: translateY(-1px);
        }

        #sidebar .tool-tile.is-active {
            background: #007bff;
            color: #ffffff;
            border-color: #007bff;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.16);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 px-4 md:px-6 py-3 md:py-4 flex items-center justify-between border-b border-gray-100">
        <div class="flex items-center space-x-2 md:space-x-3">
            <button type="button" onclick="toggleSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center bg-gray-50 rounded-lg border border-gray-200 text-gray-600">
                <i class="fas fa-bars"></i>
            </button>
            <div class="w-8 h-8 md:w-10 md:h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fas fa-users text-white text-sm md:text-xl"></i>
            </div>
            <span class="text-base md:text-xl font-bold tracking-tight text-gray-800">Cộng đồng VNA</span>
        </div>
        <div class="flex items-center space-x-2 md:space-x-4">
            <button id="createPostBtn" class="btn-primary p-2 md:px-4 md:py-2 rounded-lg font-semibold text-white text-xs md:text-sm flex items-center space-x-1 md:space-x-2">
                <i class="fas fa-plus"></i>
                <span class="hidden xs:inline">Đăng bài</span>
            </button>
            <div id="userProfile" class="flex items-center space-x-2 md:space-x-3 pl-2 md:pl-4 border-l border-gray-100">
                <span id="username" class="text-xs md:text-sm font-semibold text-gray-700 hidden sm:inline">Đang tải...</span>
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=U" class="w-7 h-7 md:w-8 md:h-8 rounded-full border border-gray-100 object-cover">
            </div>
        </div>
    </nav>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-[1000] hidden lg:hidden" onclick="toggleSidebar()"></div>

    <div class="flex flex-1">
        <aside id="sidebar" class="fixed lg:sticky w-[260px] bg-white border-r border-gray-200 transition-all duration-300 z-[1001] -left-[260px] lg:left-0 flex flex-col shadow-sm">
            <div class="flex items-center gap-3 p-5 border-b border-gray-100">
                <div class="w-9 h-9 bg-[#007bff] rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-100">
                    <i class="fas fa-users text-lg"></i>
                </div>
                <span class="text-lg font-bold tracking-tight text-slate-800">VNA</span>
            </div>

            <nav class="flex-1 overflow-y-auto p-5 space-y-2 text-sm">
                <!-- Sidebar content injected by shared-sidebar.js -->
            </nav>

            <div class="p-5 pt-4 border-t border-gray-100">
                <p class="text-xs text-gray-400 text-center font-medium">© 2026 VNA</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 container mx-auto max-w-5xl px-4 md:px-6 py-6 md:py-10">
            <!-- Header -->
            <div class="mb-8 md:mb-12 text-center">
                <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900 mb-2">Diễn đàn thảo luận 👋</h1>
                <p class="text-sm md:text-base text-gray-500">Nơi kết nối, chia sẻ kiến thức và tài nguyên.</p>
            </div>

            <!-- Post List -->
            <div id="postsContainer" class="grid grid-cols-1 gap-8">
                <!-- Loading State -->
                <div class="col-span-full py-20 text-center text-gray-400">
                    <i class="fas fa-spinner fa-spin text-4xl mb-4 text-blue-500"></i>
                    <p>Đang tải bài viết...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Post Modal -->
    <div id="createPostModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center modal-overlay p-4">
        <div class="bg-white w-full max-w-2xl rounded-2xl p-5 md:p-8 shadow-2xl animate-in fade-in zoom-in duration-300 overflow-y-auto max-h-[95vh] custom-scrollbar">
            <div class="flex items-center justify-between mb-6 md:mb-8">
                <h2 class="text-xl md:text-2xl font-bold text-gray-900">Tạo bài viết mới</h2>
                <button onclick="closeCreatePostModal()" class="text-gray-400 hover:text-gray-600 transition-colors"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="postForm" class="space-y-4 md:space-y-6">
                <div>
                    <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Tiêu đề</label>
                    <input type="text" id="postTitle" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 md:py-3.5 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-gray-800 transition-all font-medium text-sm md:text-base" placeholder="Tiêu đề bài viết (tùy chọn)...">
                </div>
                <div>
                    <label class="block text-xs md:text-sm font-bold text-gray-700 mb-2">Nội dung</label>
                    <textarea id="postContent" rows="5" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 md:py-3.5 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-gray-800 transition-all font-medium text-sm md:text-base" placeholder="Bạn đang nghĩ gì?"></textarea>
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <label class="block text-xs md:text-sm font-bold text-gray-700">Tệp đính kèm</label>
                        <div class="flex items-center space-x-4">
                            <button type="button" onclick="document.getElementById('libraryFileInput').click()" class="text-blue-600 hover:text-blue-700 text-xs md:text-sm font-bold flex items-center space-x-1.5 transition-colors">
                                <i class="fas fa-images"></i>
                                <span>Thư viện</span>
                            </button>
                            <button type="button" id="openCloudPickerBtn" class="text-blue-600 hover:text-blue-700 text-xs md:text-sm font-bold flex items-center space-x-1.5 transition-colors">
                                <i class="fas fa-cloud"></i>
                                <span>Chọn từ Cloud</span>
                            </button>
                        </div>
                    </div>
                    <input type="file" id="libraryFileInput" class="hidden" multiple accept="image/*,video/*,audio/*" onchange="handleLibraryFileSelect(event)">
                    <div id="attachmentsPreview" class="flex flex-wrap gap-2">
                        <!-- Attached files will appear here -->
                    </div>
                </div>

                <div class="flex items-start md:items-center justify-center md:justify-end space-x-4 pt-6 border-t border-gray-100 flex-col md:flex-row space-y-3 md:space-y-0">
                    <button type="button" onclick="closeCreatePostModal()" class="w-full md:w-auto px-6 py-2.5 rounded-xl font-bold text-gray-500 hover:text-gray-700 transition-colors text-sm order-2 md:order-1">Hủy bỏ</button>
                    <button type="submit" id="submitPostBtn" class="w-full md:w-auto btn-primary px-8 py-2.5 rounded-xl font-bold text-white shadow-lg shadow-blue-500/20 text-sm order-1 md:order-2">Đăng bài ngay</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Cloud Picker Modal -->
    <div id="cloudPickerModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center modal-overlay p-2 md:p-4">
        <div class="bg-white w-full max-w-3xl h-[90vh] md:h-[80vh] rounded-2xl md:rounded-3xl flex flex-col shadow-2xl border border-gray-200 overflow-hidden">
            <div class="flex items-center justify-between px-5 md:px-8 py-4 md:py-6 border-b border-gray-100">
                <h2 class="text-lg md:text-xl font-bold flex items-center space-x-2 text-gray-900">
                    <i class="fas fa-cloud text-blue-500"></i>
                    <span class="truncate">Chọn tệp từ Cloud</span>
                </h2>
                <button onclick="closeCloudPicker()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <div class="px-5 md:px-8 py-3 bg-gray-50 flex items-center space-x-2 text-[10px] md:text-xs font-bold text-gray-500 overflow-x-auto whitespace-nowrap custom-scrollbar" id="pickerBreadcrumb">
                <!-- Breadcrumb -->
            </div>

            <div class="flex-grow overflow-y-auto px-4 md:px-6 py-4 md:py-6 custom-scrollbar" id="pickerFileList">
                <!-- Files will be listed here -->
            </div>

            <div class="px-5 md:px-8 py-4 md:py-5 border-t border-gray-100 flex flex-col sm:flex-row items-center justify-between bg-gray-50/50 gap-3">
                <div id="pickerSelectionInfo" class="text-xs md:text-sm font-bold text-blue-600 truncate max-w-full text-center sm:text-left">
                    Chưa chọn tệp nào
                </div>
                <div class="flex space-x-3 w-full sm:w-auto">
                    <button onclick="closeCloudPicker()" class="flex-1 sm:flex-none px-4 py-2.5 rounded-xl text-sm font-bold text-gray-500 hover:text-gray-700">Hủy</button>
                    <button id="confirmPickerBtn" class="flex-1 sm:flex-none btn-primary px-6 py-2.5 rounded-xl text-sm font-bold text-white opacity-50 cursor-not-allowed" disabled>Chọn</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Gallery Modal (vertical scroll, light theme) -->
    <div id="imageGalleryModal" class="fixed inset-0 z-[70] hidden opacity-0 transition-opacity duration-300 modal-overlay">
        <div class="absolute inset-0 flex flex-col">
            <div class="flex items-center justify-between px-4 md:px-6 py-4 border-b border-gray-100 bg-white/90 backdrop-blur-md">
                <div class="flex items-center space-x-3">
                    <div class="text-gray-900 font-bold text-sm md:text-base">Ảnh đính kèm</div>
                    <div id="galleryCounter" class="text-gray-600 text-xs md:text-sm font-semibold bg-gray-100 px-2.5 py-1 rounded-full">
                        0 ảnh
                    </div>
                </div>
                <button onclick="closeImageGallery()" class="text-gray-500 hover:text-gray-900 transition-colors p-2">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <div id="galleryScroll" class="flex-grow overflow-y-auto custom-scrollbar px-3 md:px-8 py-4 md:py-6">
                <div id="galleryList" class="max-w-4xl mx-auto space-y-4 md:space-y-6">
                    <!-- Images will render here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let selectedAttachments = [];
        let currentPickerPath = '/';
        const MAX_TOTAL_UPLOAD_BYTES = 90 * 1024 * 1024; // 90MB per single "upload selection"

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadPosts();

            document.getElementById('createPostBtn').onclick = () => {
                if (!currentUser || !currentUser.loggedIn) {
                    alert('Bạn cần đăng nhập để đăng bài!');
                    window.location.href = '/api/auth/discord';
                    return;
                }
                document.getElementById('createPostModal').classList.remove('hidden');
            };

            document.getElementById('openCloudPickerBtn').onclick = openCloudPicker;
            document.getElementById('postForm').onsubmit = handlePostSubmit;
            document.getElementById('postContent').onpaste = handlePaste;
        });

        async function checkAuth() {
            try {
                const res = await fetch('/api/user-info');
                currentUser = await res.json();
                if (currentUser.loggedIn) {
                    document.getElementById('username').innerText = currentUser.username;
                    if (currentUser.avatar) {
                        document.getElementById('userAvatar').src = currentUser.avatar;
                    }
                } else {
                    document.getElementById('username').innerText = 'Khách';
                }
            } catch (e) {
                console.error('Lỗi kiểm tra đăng nhập:', e);
            }
        }

        async function loadPosts() {
            try {
                const res = await fetch('/api/forum/posts');
                const posts = await res.json();
                const container = document.getElementById('postsContainer');
                // Store images per post to avoid embedding JSON in inline onclick (can break on special chars/newlines)
                window.__forumPostImages = {};
                
                if (!Array.isArray(posts)) {
                    throw new Error('Invalid posts payload');
                }

                if (posts.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full py-20 text-center text-gray-400">
                            <i class="fas fa-newspaper text-5xl mb-4 opacity-20"></i>
                            <p class="font-medium">Chưa có bài viết nào. Hãy là người đầu tiên chia sẻ!</p>
                        </div>`;
                    return;
                }

                container.innerHTML = posts.map(post => `
                    <div class="post-card white-card rounded-2xl overflow-hidden flex flex-col p-4 md:p-6">
                        <div class="flex items-center space-x-3 mb-4 md:mb-5">
                            <img src="${escapeHtml(safeAvatarUrl(post.author_avatar, post.author_name))}" class="w-9 h-9 md:w-11 md:h-11 rounded-full border border-gray-100 shadow-sm object-cover">
                            <div>
                                <h4 class="text-xs md:text-sm font-bold text-gray-900">${escapeHtml(post.author_name || 'Anonymous')}</h4>
                                <span class="text-[10px] md:text-[11px] font-bold text-gray-400 uppercase tracking-wider">${timeSince(new Date(post.created_at))}</span>
                            </div>
                        </div>
                        ${post.title ? `<h3 class="text-lg md:text-xl font-bold mb-2 md:mb-3 text-gray-900 leading-tight">${escapeHtml(post.title)}</h3>` : ''}
                        ${post.content ? `<p class="text-gray-600 text-sm md:text-[15px] line-clamp-3 mb-5 md:mb-6 leading-relaxed">${escapeHtml(post.content)}</p>` : ''}
                        
                        ${post.attachments && post.attachments.length > 0 ? (() => {
                            const images = post.attachments.filter(att => isImageFile(att.name));
                            const otherFiles = post.attachments.filter(att => !isImageFile(att.name));
                            // Save full images list for safe gallery opening
                            window.__forumPostImages[post.id] = images;
                            
                            let html = '<div class="mt-auto pt-4 md:pt-5 border-t border-gray-50 space-y-4">';
                            
                            // Render Images Grid
                            if (images.length > 0) {
                                const visibleImages = images.slice(0, 4);
                                const extraCount = images.length - 4;
                                const gridClass = images.length === 1 ? 'grid-cols-1' : (images.length === 2 ? 'grid-cols-2' : 'grid-cols-2');

                                html += `
                                    <div class="grid ${gridClass} gap-2 md:gap-3 ${images.length === 3 ? '[&>div:first-child]:col-span-2 [&>div:first-child]:aspect-video [&>div:first-child]:row-span-2' : ''}">
                                         ${visibleImages.map((img, index) => `
                                             <div class="aspect-square rounded-xl overflow-hidden border border-gray-100 bg-gray-50 group relative cursor-pointer shadow-sm hover:shadow-md transition-all" onclick="openImageGalleryForPost(${post.id}, ${index})">
                                                <img src="/api/cloud/public/${img.token}/thumb?w=720" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy">
                                                 <a href="/api/cloud/public/${img.token}/download" onclick="event.stopPropagation();" class="absolute top-2 right-2 z-20 w-8 h-8 rounded-lg bg-white/90 hover:bg-white text-gray-700 hover:text-blue-600 flex items-center justify-center shadow-sm opacity-0 group-hover:opacity-100 transition-all" title="Tải xuống">
                                                     <i class="fas fa-download text-sm"></i>
                                                 </a>
                                                 
                                                 ${index === 3 && extraCount > 0 ? `
                                                     <!-- +N Overlay -->
                                                     <div class="absolute inset-0 bg-black/50 text-white flex items-center justify-center text-xl md:text-3xl font-bold backdrop-blur-sm z-10">
                                                         +${extraCount}
                                                     </div>
                                                 ` : `
                                                     <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-colors flex items-center justify-center z-10">
                                                         <i class="fas fa-search-plus text-white opacity-0 group-hover:opacity-100 transition-opacity"></i>
                                                     </div>
                                                 `}
                                             </div>
                                         `).join('')}
                                    </div>
                                `;
                            }
                            
                            // Render Other Files
                            if (otherFiles.length > 0) {
                                html += `
                                    <div class="space-y-3">
                                        ${images.length > 0 ? '<p class="text-[9px] md:text-[10px] font-extrabold text-gray-400 uppercase tracking-widest">Tệp đính kèm khác:</p>' : ''}
                                        ${otherFiles.map(att => {
                                            const isAudio = isAudioFile(att.name);
                                            const isVideo = isVideoFile(att.name);
                                            const previewUrl = `/api/cloud/public/${att.token}/preview`;
                                            const inlinePreviewId = `postAttPrev-${post.id}-${att.token}`;
                                            
                                            return `
                                                <div class="space-y-2">
                                                     <div class="flex items-center p-2.5 md:p-3 rounded-xl bg-gray-50 border border-gray-100 hover:bg-blue-50 hover:border-blue-100 transition-all group">
                                                         <i class="fas ${getFileIcon(att.name)} text-blue-500 mr-3 text-base md:text-lg"></i>
                                                         <div class="flex flex-col truncate">
                                                            <span class="text-[11px] md:text-xs font-bold text-gray-700 group-hover:text-blue-600 truncate">${escapeHtml(att.name)}</span>
                                                        </div>
                                                         ${(isAudio || isVideo) ? `
                                                             <button type="button" onclick="toggleInlinePreview('${inlinePreviewId}')" class="ml-3 text-[10px] font-extrabold text-blue-600 hover:text-blue-700 transition-colors uppercase tracking-tight">
                                                                 Xem trước
                                                             </button>
                                                         ` : ''}
                                                         <div class="ml-auto flex items-center gap-3">
                                                             <a href="/api/cloud/public/${att.token}/download" class="text-[10px] font-extrabold text-gray-400 hover:text-blue-600 transition-colors uppercase tracking-tight">
                                                                 Tải xuống <i class="fas fa-download ml-1"></i>
                                                             </a>
                                                             <a href="/p/cloud.html?share=${att.token}" target="_blank" class="text-[10px] font-extrabold text-gray-400 hover:text-blue-600 transition-colors uppercase tracking-tight">
                                                                 Mở <i class="fas fa-external-link-alt ml-1"></i>
                                                             </a>
                                                         </div>
                                                     </div>
                                                     ${(isAudio || isVideo) ? `
                                                         <div id="${inlinePreviewId}" class="hidden px-1">
                                                             ${isAudio ? `<audio controls class="w-full h-8 rounded-lg opacity-90" src="${previewUrl}"></audio>` : ''}
                                                             ${isVideo ? `<video controls class="w-full rounded-xl border border-gray-100 max-h-[260px]" src="${previewUrl}" preload="metadata"></video>` : ''}
                                                         </div>
                                                     ` : ''}
                                                 </div>
                                             `;
                                        }).join('')}
                                    </div>
                                `;
                            }
                            
                            html += '</div>';
                            return html;
                        })() : ''}

                        <!-- Interactions -->
                        <div class="mt-6 pt-4 border-t border-gray-50 flex items-center space-x-6">
                            <button onclick="toggleLike(${post.id})" id="likeBtn-${post.id}" class="like-btn flex items-center space-x-2 text-gray-500 hover:text-red-500 transition-colors ${post.user_liked ? 'active' : ''}">
                                <i class="${post.user_liked ? 'fas' : 'far'} fa-heart"></i>
                                <span class="text-xs font-bold" id="likeCount-${post.id}">${post.like_count || 0}</span>
                            </button>
                            <button onclick="toggleComments(${post.id})" class="flex items-center space-x-2 text-gray-500 hover:text-blue-600 transition-colors">
                                <i class="far fa-comment"></i>
                                <span class="text-xs font-bold" id="commentCount-${post.id}">${post.comment_count || 0}</span>
                            </button>
                        </div>

                        <!-- Comment Section (Hidden by default) -->
                        <div id="commentSection-${post.id}" class="comment-section mt-4 bg-gray-50/50 rounded-xl">
                            <div class="p-4 space-y-4">
                                <div id="commentList-${post.id}" class="space-y-4 max-h-[300px] overflow-y-auto custom-scrollbar">
                                    <div class="text-center py-4 text-gray-400 text-xs italic">Đang tải bình luận...</div>
                                </div>

        async function toggleLike(postId) {
            if (!currentUser || !currentUser.loggedIn) {
                alert('Bạn cần đăng nhập để thả tim!');
                return;
            }

            const btn = document.getElementById(`likeBtn-${postId}`);
            const countEl = document.getElementById(`likeCount-${postId}`);
            const icon = btn.querySelector('i');
            
            try {
                const res = await fetch(`/api/forum/posts/${postId}/like`, { method: 'POST' });
                const result = await res.json();
                
                if (result.success) {
                    let count = parseInt(countEl.innerText);
                    if (result.liked) {
                        btn.classList.add('active');
                        icon.className = 'fas fa-heart';
                        count++;

                        btn.classList.remove('active');
                        icon.className = 'far fa-heart';

        async function toggleComments(postId) {
            const section = document.getElementById(`commentSection-${postId}`);
            const isOpen = section.classList.contains('open');
            
            if (isOpen) {
                section.classList.remove('open');
            } else {
                section.classList.add('open');
                loadComments(postId);
            }
        }

        async function loadComments(postId) {
            const list = document.getElementById(`commentList-${postId}`);
            try {
                const res = await fetch(`/api/forum/posts/${postId}/comments`);
                const comments = await res.json();
                if (!Array.isArray(comments)) {
                    throw new Error('Invalid comments payload');
                }

                window.__forumCommentAuthors = window.__forumCommentAuthors || {};
                window.__forumCommentAuthors[postId] = {};
                comments.forEach((c) => {
                    window.__forumCommentAuthors[postId][c.id] = String(c?.author_name || '').trim();
                });
                
                const tree = buildCommentTree(comments);
                
                if (tree.length === 0) {
                    list.innerHTML = '<div class="text-center py-4 text-gray-400 text-xs italic">Chưa có bình luận nào.</div>';
                    return;
                }

                list.innerHTML = renderCommentTree(tree, postId);
            } catch (e) {
                list.innerHTML = '<div class="text-center py-4 text-red-400 text-xs">Lỗi tải bình luận.</div>';
            }
        }

        function buildCommentTree(comments) {
            const map = {};
            const tree = [];
            
            comments.forEach(c => {
                c.replies = [];
                map[c.id] = c;
            });

            comments.forEach(c => {
                if (c.parent_id && map[c.parent_id]) {
                    map[c.parent_id].replies.push(c);
                } else {
                    tree.push(c);
                }
            });

            return tree;
        }

        const openCommentThreads = new Set();

        function renderCommentTree(nodes, postId, level = 1) {
            return nodes.map(c => {
                const hasReplies = c.replies && c.replies.length > 0;
                const isReply = level > 1;
                // Only indent if we haven't reached the cap (3 levels)
                const shouldIndent = isReply && level <= 3;
                
                const isForcedOpen = openCommentThreads.has(c.id);

                return `
                    <div id="comment-${c.id}" data-parent-id="${c.parent_id || ''}" class="space-y-3 ${shouldIndent ? 'ml-8 md:ml-10 border-l-2 border-gray-100 pl-4 mt-3' : (isReply ? 'mt-3' : 'mb-4')}">
                        <div class="flex items-start space-x-3 group">
                            <img src="${escapeHtml(safeAvatarUrl(c.author_avatar, c.author_name))}" class="w-7 h-7 md:w-8 md:h-8 rounded-full object-cover shadow-sm">
                            <div id="commentBody-${c.id}" class="flex-grow bg-white p-2.5 md:p-3 rounded-2xl border border-gray-100 shadow-sm transition-all group-hover:border-blue-100">
                                <div class="flex items-center justify-between mb-1">
                                    <span class="text-[11px] md:text-xs font-bold text-gray-900">${escapeHtml(c.author_name)}</span>
                                    <span class="text-[9px] md:text-[10px] font-bold text-gray-400 uppercase tracking-tight">${timeSince(new Date(c.created_at))}</span>
                                </div>
                                ${c.parent_id ? `
                                    <div class="mb-2">
                                        <button onclick="scrollToComment(${c.parent_id})" class="text-[9px] md:text-[10px] bg-green-50 text-green-600 px-2 py-0.5 rounded-full font-bold hover:bg-green-100 transition-colors">
                                            <i class="fas fa-reply mr-1"></i>Đang trả lời...
                                        </button>
                                    </div>
                                ` : ''}
                                <p class="text-[13px] md:text-sm text-gray-700 leading-snug break-words whitespace-pre-line">${escapeHtml(c.content)}</p>
                                <div class="mt-2 flex items-center space-x-4">
                                    <button onclick="replyToComment(${postId}, ${c.id})" class="text-[10px] font-bold text-blue-500 hover:text-blue-700 transition-colors uppercase tracking-tight">Trả lời</button>
                                    ${hasReplies ? `
                                        <button onclick="toggleCommentReplies(${c.id})" id="toggleBtn-${c.id}" class="text-[10px] font-bold text-gray-400 hover:text-gray-600 transition-colors uppercase tracking-tight">
                                            <i class="fas ${isForcedOpen ? 'fa-chevron-up' : 'fa-chevron-down'} mr-1"></i>${isForcedOpen ? 'Ẩn' : 'Xem'} ${c.replies.length} phản hồi
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                        ${hasReplies ? `
                            <div id="replies-${c.id}" class="${isForcedOpen ? '' : 'hidden'}">
                                ${renderCommentTree(c.replies, postId, level + 1)}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function scrollToComment(commentId) {
            const el = document.getElementById(`comment-${commentId}`);
            const body = document.getElementById(`commentBody-${commentId}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                if (body) {
                    body.classList.add('comment-parent-highlight');
                    setTimeout(() => {
                        body.classList.remove('comment-parent-highlight');
                    }, 2000);
                }
            } else {
                // If parent is not rendered (e.g. collapsed), mention it
                alert('Bình luận gốc đang bị ẩn hoặc không tìm thấy.');
            }
        }

        window.toggleCommentReplies = (commentId, forceOpen = false) => {
            const el = document.getElementById(`replies-${commentId}`);
            const btn = document.getElementById(`toggleBtn-${commentId}`);
            if (!el || !btn) return;

            const isOpen = !el.classList.contains('hidden');

            if (forceOpen || !isOpen) {
                el.classList.remove('hidden');
                btn.innerHTML = `<i class="fas fa-chevron-up mr-1"></i>Ẩn phản hồi`;
                openCommentThreads.add(commentId);
            } else {
                el.classList.add('hidden');
                btn.innerHTML = `<i class="fas fa-chevron-down mr-1"></i>Xem phản hồi`;
                openCommentThreads.delete(commentId);
            }
        };

        function expandThreadRecursively(commentId) {
            if (!commentId) return;
            openCommentThreads.add(commentId);
            const el = document.getElementById(`comment-${commentId}`);
            if (el) {
                const parentId = el.getAttribute('data-parent-id');
                if (parentId) expandThreadRecursively(parseInt(parentId));
            }
        }

        const activeReplyCommentIds = {};

        async function submitComment(postId) {
            if (!currentUser || !currentUser.loggedIn) {
                alert('Bạn cần đăng nhập để bình luận!');
                return;
            }

            const input = document.getElementById(`commentInput-${postId}`);
            const content = input.value.trim();
            if (!content) return;

            const parentId = activeReplyCommentIds[postId] || null;

            input.disabled = true;
            try {
                const res = await fetch(`/api/forum/posts/${postId}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        content,
                        parent_id: parentId
                    })
                });
                const result = await res.json();
                
                if (result.success) {
                    input.value = '';
                    const lastParentId = activeReplyCommentIds[postId];
                    activeReplyCommentIds[postId] = null;
                    const countEl = document.getElementById(`commentCount-${postId}`);
                    countEl.innerText = parseInt(countEl.innerText) + 1;
                    
                    await loadComments(postId);
                    
                    // Auto expand full path if was a reply
                    if (lastParentId) {
                        expandThreadRecursively(lastParentId);
                        // Refresh rendering with new Open state
                        await loadComments(postId);
                    }
                }
            } catch (e) {
                console.error('Lỗi khi gửi bình luận:', e);
            } finally {
                input.disabled = false;
                input.focus();
            }
        }

        function replyTo(username, postId, commentId = null) {
            const input = document.getElementById(`commentInput-${postId}`);
            const tag = `@${username} `;
            
            activeReplyCommentIds[postId] = commentId;

            // If already contains the tag, just focus
            if (input.value.includes(tag)) {
                input.focus();
                return;
            }

            // Prepend tag and focus
            input.value = tag + input.value;
            input.focus();
            
            // Move cursor to end
            const length = input.value.length;
            input.setSelectionRange(length, length);
        }

        function replyToComment(postId, commentId) {
            const username = window.__forumCommentAuthors?.[postId]?.[commentId] || 'Anonymous';
            replyTo(username, postId, commentId);
        }

        async function loadPickerFiles(path) {
            currentPickerPath = path;
            const fileList = document.getElementById('pickerFileList');
            const breadcrumb = document.getElementById('pickerBreadcrumb');
            const confirmBtn = document.getElementById('confirmPickerBtn');
            const info = document.getElementById('pickerSelectionInfo');

            fileList.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin mr-2 text-blue-500"></i>Đang tải dữ liệu...</div>';
            confirmBtn.disabled = true;
            confirmBtn.classList.add('opacity-50', 'cursor-not-allowed');
            info.innerText = 'Chưa chọn tệp nào';
            pickerSelectedFile = null;

            // Render breadcrumb
            const segments = path.split('/').filter(Boolean);
            let bcHtml = `<button onclick="loadPickerFiles('/')" class="hover:text-blue-600 uppercase">Gốc</button>`;
            let currentPath = '';
            segments.forEach((seg, i) => {
                currentPath += '/' + seg;
                bcHtml += ` <i class="fas fa-chevron-right text-[10px] mx-1 opacity-40"></i> <button onclick="loadPickerFiles('${currentPath}')" class="hover:text-blue-600 uppercase">${seg}</button>`;
            });
            breadcrumb.innerHTML = bcHtml;

            try {
                const res = await fetch(`/api/cloud/files?path=${encodeURIComponent(path)}`);
                const result = await res.json();
                
                if (!result.success) {
                    fileList.innerHTML = `<div class="text-center py-10 text-red-500 font-bold">Lỗi: ${result.error || 'Không thể tải dữ liệu'}</div>`;
                    return;
                }

                const items = result.data.items;
                
                if (items.length === 0) {
                    fileList.innerHTML = '<div class="text-center py-10 text-gray-400 font-medium">Thư mục trống</div>';
                    return;
                }

                fileList.innerHTML = `
                    <div class="grid grid-cols-1 gap-2">
                        ${items.map(item => {
                            const isFolder = item.type === 'folder';
                            return `
                                <div class="flex items-center px-5 py-4 rounded-2xl hover:bg-blue-50 cursor-pointer border border-transparent hover:border-blue-100 transition-all group ${isFolder ? '' : 'selectable-file'}" 
                                     onclick="${isFolder ? `loadPickerFiles('${path === '/' ? '' : path}/${item.name}')` : `selectFileInPicker('${item.name}', '${path}', this)`}">
                                    <div class="w-11 h-11 rounded-xl ${isFolder ? 'bg-yellow-50 text-yellow-500' : 'bg-blue-50 text-blue-500'} flex items-center justify-center mr-4 transition-transform group-hover:scale-110">
                                        <i class="fas ${isFolder ? 'fa-folder' : getFileIcon(item.name)} text-xl"></i>
                                    </div>
                                    <span class="text-sm font-bold text-gray-700 flex-grow truncate">${item.name}</span>
                                    ${isFolder ? '<i class="fas fa-chevron-right text-xs text-gray-300 group-hover:text-blue-500"></i>' : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            } catch (e) {
                fileList.innerHTML = '<div class="text-center py-10 text-red-500 font-bold">Lỗi tải danh sách tệp</div>';
            }
        }

        window.selectFileInPicker = async (name, path, el) => {
            const fullPath = (path === '/' ? '' : path) + '/' + name;
            pickerSelectedFile = { name, path: fullPath };
            
            // Highlight selected
            document.querySelectorAll('.selectable-file').forEach(item => {
                item.classList.remove('bg-blue-100', 'border-blue-200');
            });
            el.classList.add('bg-blue-100', 'border-blue-200');

            document.getElementById('pickerSelectionInfo').innerText = 'Đã chọn: ' + name;
            const btn = document.getElementById('confirmPickerBtn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');

            btn.onclick = async () => {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Đang xử lý...';
                try {
                    const shareRes = await fetch('/api/cloud/share', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: fullPath, expireDays: 365 })
                    });
                    const shareData = await shareRes.json();
                    if (shareData.success && shareData.data.token) {
                        selectedAttachments.push({
                            name: name,
                            token: shareData.data.token,
                            path: fullPath
                        });
                        renderAttachmentsPreview();
                        closeCloudPicker();
                    } else {
                        alert('Không thể tạo link chia sẻ cho tệp này!');
                    }
                } catch (e) {
                    alert('Lỗi tạo link chia sẻ!');
                } finally {
                    btn.disabled = false;
                    btn.innerText = 'Xác nhận chọn';
                }
            };
        };

        async function handlePaste(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (const item of items) {
                if (item.type.indexOf('image') !== -1) {
                    const blob = item.getAsFile();
                    if (blob) {
                        uploadPastedFile(blob);
                    }
                }
            }
        }

        async function uploadPastedFile(file) {
            if (file && file.size && file.size > MAX_TOTAL_UPLOAD_BYTES) {
                alert('File dán vào vượt quá giới hạn 90MB!');
                return;
            }
            const container = document.getElementById('attachmentsPreview');
            const loadingId = 'loading-' + Date.now();
            
            // Add a loading placeholder
            const placeholder = document.createElement('div');
            placeholder.id = loadingId;
            placeholder.className = 'flex items-center bg-gray-50 px-4 py-2.5 rounded-xl border border-gray-100 space-x-3 animate-pulse';
            placeholder.innerHTML = `
                <i class="fas fa-spinner fa-spin text-blue-500"></i>
                <span class="text-xs font-bold text-gray-500">Đang tải ảnh...</span>
            `;
            container.appendChild(placeholder);

            try {
                const formData = new FormData();
                formData.append('path', '/forum_images');
                formData.append('files', file, `paste-${Date.now()}.png`);

                const uploadRes = await fetch('/api/cloud/upload', {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();

                if (uploadData.success && uploadData.data.uploaded.length > 0) {
                    const fileName = uploadData.data.uploaded[0].name;
                    const fullPath = '/forum_images/' + fileName;

                    const shareRes = await fetch('/api/cloud/share', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: fullPath })
                    });
                    const shareData = await shareRes.json();
                    
                    if (shareData.success && shareData.data.token) {
                        selectedAttachments.push({
                            name: fileName,
                            token: shareData.data.token,
                            path: fullPath
                        });
                        renderAttachmentsPreview();
                    }
                }
            } catch (err) {
                console.error('Upload failed:', err);
            } finally {
                const p = document.getElementById(loadingId);
                if (p) p.remove();
            }
        }

        async function handleLibraryFileSelect(e) {
            const files = Array.from(e.target.files || []);
            if (files.length === 0) return;

            const totalSize = files.reduce((sum, f) => sum + (f?.size || 0), 0);
            if (totalSize > MAX_TOTAL_UPLOAD_BYTES) {
                alert(`Tổng dung lượng tệp chọn vượt quá 90MB. Vui lòng chọn lại!`);
                // Reset input so user can select again
                e.target.value = '';
                return;
            }

            for (const file of files) {
                await uploadLibraryFile(file);
            }

            // Reset input so same file can be selected again if removed
            e.target.value = '';
        }

        window.removeAttachment = (index) => {

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const icons = {
                pdf: 'fa-file-pdf',
                doc: 'fa-file-word', docx: 'fa-file-word',
                xls: 'fa-file-excel', xlsx: 'fa-file-excel',
                png: 'fa-file-image', jpg: 'fa-file-image', jpeg: 'fa-file-image', gif: 'fa-file-image', webp: 'fa-file-image', avif: 'fa-file-image',
                mp4: 'fa-file-video', mkv: 'fa-file-video', avi: 'fa-file-video',
                zip: 'fa-file-archive', rar: 'fa-file-archive', '7z': 'fa-file-archive',
                mp3: 'fa-file-audio', wav: 'fa-file-audio', ogg: 'fa-file-audio', m4a: 'fa-file-audio'
            };
            return icons[ext] || 'fa-file';
        }

        function isAudioFile(filename) {
            return /\.(mp3|wav|ogg|m4a|aac)$/i.test(filename);
        }

        function isVideoFile(filename) {
            return /\.(mp4|mkv|avi|mov|webm)$/i.test(filename);
        }

        function isImageFile(filename) {
            return /\.(jpg|jpeg|png|gif|webp|avif)$/i.test(filename);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function safeAvatarUrl(rawAvatar, rawName) {
            const avatar = String(rawAvatar || '').trim();
            if (avatar) return avatar;
            const name = String(rawName || '').trim().slice(0, 80);
            return `https://ui-avatars.com/api/?name=${encodeURIComponent(name || 'User')}`;
        }

        function timeSince(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " năm trước";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " tháng trước";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " ngày trước";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " giờ trước";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " phút trước";
            return "Vừa xong";
        }

        window.toggleInlinePreview = (id) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.toggle('hidden');
        };
        // --- Image Gallery Logic (vertical scroll) ---
        let currentGalleryImages = [];

        window.openImageGallery = (imagesJson, startIndex) => {
            try {
                const safeParseImages = (raw) => {
                    try {
                        return JSON.parse(raw);
                    } catch (e1) {
                        // If the JSON got HTML-escaped somewhere (entities), decode then parse again.
                        // This makes gallery more robust in case of edge cases.
                        try {
                            const textarea = document.createElement('textarea');
                            textarea.innerHTML = raw;
                            return JSON.parse(textarea.value);
                        } catch (e2) {
                            throw e1;
                        }
                    }
                };

                currentGalleryImages = safeParseImages(imagesJson) || [];

                const modal = document.getElementById('imageGalleryModal');
                if (!modal) return;
                modal.classList.remove('hidden');
                void modal.offsetWidth; // reflow
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');

                document.body.style.overflow = 'hidden';

                const counter = document.getElementById('galleryCounter');
                counter.innerText = `${currentGalleryImages.length} ảnh`;

                const list = document.getElementById('galleryList');
                list.innerHTML = currentGalleryImages.map((img, idx) => `
                    <div id="gallery-item-${idx}" class="white-card rounded-2xl overflow-hidden">
                        <div class="px-4 py-3 flex items-center justify-between border-b border-gray-100 bg-white">
                            <div class="text-gray-700 text-xs md:text-sm font-bold">Ảnh ${idx + 1} / ${currentGalleryImages.length}</div>
                            <div class="flex items-center gap-3">
                                <a class="text-blue-600 hover:text-blue-700 text-xs md:text-sm font-bold transition-colors" href="/api/cloud/public/${img.token}/download">
                                    Tải xuống <i class="fas fa-download ml-1"></i>
                                </a>
                                <a class="text-blue-600 hover:text-blue-700 text-xs md:text-sm font-bold transition-colors" href="/p/cloud.html?share=${img.token}" target="_blank" rel="noopener noreferrer">
                                    Mở tab mới <i class="fas fa-external-link-alt ml-1"></i>
                                </a>
                            </div>
                        </div>
                        <div class="p-3 md:p-4 bg-white">
                            <img src="/api/cloud/public/${img.token}/preview" alt="${escapeHtml(img.name || ('image-' + (idx + 1)))}" class="w-full h-auto rounded-xl object-contain bg-gray-50 border border-gray-100">
                        </div>
                    </div>
                `).join('');

                // Scroll to clicked image
                const scroll = document.getElementById('galleryScroll');
                const target = document.getElementById(`gallery-item-${Math.max(0, startIndex || 0)}`);
                if (scroll && target) {
                    requestAnimationFrame(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }));
                }

                document.addEventListener('keydown', handleGalleryKeydown);
            } catch (e) {
                console.error('Error opening gallery:', e);
            }
        };

        window.closeImageGallery = () => {
            const modal = document.getElementById('imageGalleryModal');
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');

            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
                document.removeEventListener('keydown', handleGalleryKeydown);
                currentGalleryImages = [];
                const list = document.getElementById('galleryList');
                if (list) list.innerHTML = '';
            }, 300);
        };

        function handleGalleryKeydown(e) {
            if (e.key === 'Escape') closeImageGallery();
        }
    </script>
    <script src="/html/shared-sidebar.js"></script>
    <script>
        function syncForumNavHeight() {
            const nav = document.querySelector('nav');
            if (!nav) return;
            const height = Math.round(nav.getBoundingClientRect().height || 0);
            document.documentElement.style.setProperty('--forum-nav-h', `${height}px`);
        }

        function toggleSidebar() {
            if (window.innerWidth >= 1024) return;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!sidebar || !overlay) return;
            const isOpen = sidebar.classList.contains('left-0');
            if (isOpen) {
                sidebar.classList.remove('left-0');
                sidebar.classList.add('-left-[260px]');
                overlay.classList.add('hidden');
                return;
            }
            sidebar.classList.add('left-0');
            sidebar.classList.remove('-left-[260px]');
            overlay.classList.remove('hidden');
        }

        function closeSidebar() {
            if (window.innerWidth >= 1024) return;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!sidebar || !overlay) return;
            sidebar.classList.remove('left-0');
            sidebar.classList.add('-left-[260px]');
            overlay.classList.add('hidden');
        }

        window.addEventListener('resize', () => {
            syncForumNavHeight();
            closeSidebar();
        });
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', syncForumNavHeight, { once: true });
        } else {
            syncForumNavHeight();
        }
    </script>
