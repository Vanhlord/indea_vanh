
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/photos/server-icon/icon-server.png">
    <link rel="apple-touch-icon" href="/photos/server-icon/icon-server.png">
    <title>Cloud VNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; overflow-x: hidden; }
        .sidebar-transition { transition: all 0.3s ease-in-out; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
    <link rel="stylesheet" href="/html/shared-theme.css">
</head>
<body class="text-gray-800">

    <header class="bg-white border-b border-gray-200 py-3 px-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button id="menu-toggle" class="p-2 hover:bg-gray-100 rounded-lg transition-colors active:scale-95">
                <i class="fas fa-bars text-xl text-gray-600"></i>
            </button>
            <a href="/" class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg text-white shadow-sm">
                    <i class="fas fa-cloud text-lg"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight text-blue-600 hidden sm:inline">MYCLOUD</span>
            </a>
        </div>

        <div class="flex items-center gap-3">
            <div class="relative hidden md:block">
                <input id="search-input" type="text" placeholder="Tìm file của bạn..." class="bg-gray-100 border border-transparent rounded-full py-2 px-10 text-sm w-64 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                <i class="fas fa-search absolute left-4 top-3 text-gray-400 text-xs"></i>
            </div>
            <div id="user-avatar-wrap" class="relative w-9 h-9 rounded-full bg-gradient-to-tr from-blue-600 to-blue-400 flex items-center justify-center text-white font-bold shadow-md overflow-hidden" title="Tài khoản">
                <img id="user-avatar-img" class="hidden w-full h-full object-cover" alt="Discord Avatar">
                <span id="user-avatar-fallback" class="text-xs font-bold">DC</span>
            </div>
        </div>
    </header>

    <div class="flex">
        <aside id="sidebar" class="fixed md:sticky top-[61px] left-0 w-64 h-[calc(100vh-61px)] bg-white border-r border-gray-200 p-4 z-40 sidebar-transition -translate-x-full md:translate-x-0 shadow-2xl md:shadow-none">
            <button id="upload-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl mb-2 shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-2 active:scale-95">
                <i class="fas fa-plus"></i> Tải lên mới
            </button>
            <input id="upload-input" type="file" multiple class="hidden">

            <div class="grid grid-cols-2 gap-2 mb-6">
                <button id="create-file-btn" class="bg-white border border-gray-200 hover:border-blue-300 hover:bg-blue-50 text-gray-600 text-sm font-semibold py-2 rounded-lg transition-all">
                    <i class="fas fa-file-circle-plus mr-1"></i>Tạo file
                </button>
                <button id="create-folder-btn" class="bg-white border border-gray-200 hover:border-blue-300 hover:bg-blue-50 text-gray-600 text-sm font-semibold py-2 rounded-lg transition-all">
                    <i class="fas fa-folder-plus mr-1"></i>Tạo folder
                </button>
            </div>

            <nav class="space-y-1">
                <a id="all-files-link" href="#" class="flex items-center gap-3 p-3 bg-blue-50 text-blue-600 rounded-xl font-semibold">
                    <i class="fas fa-folder-open w-5 text-center"></i> Tất cả file
                </a>
                <a id="recent-files-link" href="#" class="flex items-center gap-3 p-3 text-gray-500 hover:bg-gray-50 hover:text-blue-500 rounded-xl transition-all">
                    <i class="fas fa-clock w-5 text-center"></i> Gần đây
                </a>
                <a id="trash-files-link" href="#" class="flex items-center gap-3 p-3 text-gray-500 hover:bg-gray-50 rounded-xl transition-all">
                    <i class="fas fa-trash w-5 text-center"></i> Thùng rác
                </a>
            </nav>

            <div class="absolute bottom-8 left-4 right-4 p-4 bg-gray-50 rounded-2xl">
                <div class="flex justify-between text-[10px] font-bold text-gray-400 uppercase mb-2">
                    <span>Dung lượng</span>
                    <span id="storage-label">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-1.5">
                    <div id="storage-bar" class="bg-blue-500 h-1.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-3 md:p-5 w-full sidebar-transition">
            <div id="breadcrumb" class="mb-2 px-2 text-xs text-gray-400 truncate">/</div>
            <div class="flex justify-between items-center mb-4 px-2 gap-3">
                <h1 id="page-title" class="text-lg font-bold text-gray-700 tracking-tight">Tệp tin của bạn</h1>
                <div class="flex items-center gap-1.5 bg-gray-100 p-1 rounded-lg">
                    <button id="view-list-btn" class="px-2 py-1 text-blue-600 bg-white shadow-sm rounded-md transition-all"><i class="fas fa-list text-xs"></i></button>
                    <button id="view-grid-btn" class="px-2 py-1 text-gray-400 hover:text-blue-500 rounded-md transition-all"><i class="fas fa-th-large text-xs"></i></button>
                </div>
            </div>

            <div id="status-line" class="px-3 pb-2 text-xs text-gray-400"></div>
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <div id="list-view" class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50/80 border-b border-gray-100 text-gray-400 text-[10px] uppercase font-bold tracking-widest">
                            <tr>
                                <th class="px-4 py-2.5">Tên File</th>
                                <th class="px-4 py-2.5">Ngày sửa</th>
                                <th class="px-4 py-2.5 text-right">Dung lượng</th>
                                <th class="px-4 py-2.5 w-12"></th>
                            </tr>
                        </thead>
                        <tbody id="file-list-body" class="divide-y divide-gray-50 text-[13px]"></tbody>
                    </table>
                </div>
                <div id="grid-view" class="hidden p-3 md:p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>
            </div>
        </main>
    </div>

    <div id="row-action-menu" class="hidden fixed z-[70] w-44 rounded-lg border border-gray-200 bg-white shadow-lg p-1">
        <button id="menu-primary" class="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-md transition-all"></button>
        <button id="menu-secondary" class="w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-md transition-all"></button>
        <button id="menu-tertiary" class="hidden w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-md transition-all"></button>
        <button id="menu-quaternary" class="hidden w-full text-left px-3 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-md transition-all"></button>
    </div>

    <div id="preview-modal" class="hidden fixed inset-0 z-[80] bg-black/50 p-4">
        <div class="w-full h-full flex items-center justify-center">
            <div class="w-full max-w-4xl max-h-[90vh] bg-white rounded-xl border border-gray-200 shadow-2xl overflow-hidden flex flex-col">
                <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between gap-3">
                    <h2 id="preview-title" class="text-sm md:text-base font-semibold text-gray-700 truncate">Xem trước</h2>
                    <button id="preview-close-btn" class="text-gray-400 hover:text-gray-700 transition-colors p-1.5 rounded-md hover:bg-gray-100">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
                <div id="preview-body" class="p-4 md:p-5 overflow-auto flex-1"></div>
            </div>
        </div>
    </div>

    <div id="editor-modal" class="hidden fixed inset-0 z-[85] bg-black/60 p-4">
        <div class="w-full h-full flex items-center justify-center">
            <div class="w-full max-w-5xl max-h-[92vh] bg-white rounded-xl border border-gray-200 shadow-2xl overflow-hidden flex flex-col">
                <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between gap-3">
                    <h2 id="editor-title" class="text-sm md:text-base font-semibold text-gray-700 truncate">Chỉnh sửa file</h2>
                    <button id="editor-close-btn" class="text-gray-400 hover:text-gray-700 transition-colors p-1.5 rounded-md hover:bg-gray-100">
                        <i class="fas fa-xmark"></i>
                    </button>
                </div>
                <div class="p-4 md:p-5 flex-1 overflow-auto space-y-3">
                    <div id="editor-status" class="text-xs text-gray-400"></div>
                    <textarea id="editor-textarea" class="w-full min-h-[45vh] rounded-lg border border-gray-200 px-3 py-2 text-sm font-mono text-gray-700 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent whitespace-pre overflow-x-auto" spellcheck="false" wrap="off"></textarea>
                    <div id="editor-history" class="rounded-lg border border-gray-200 bg-gray-50 p-3"></div>
                </div>
                <div class="px-4 py-3 border-t border-gray-100 flex items-center justify-end gap-2">
                    <button id="editor-cancel-btn" class="px-3 py-2 text-sm rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">Đóng</button>
                    <button id="editor-save-btn" class="px-3 py-2 text-sm rounded-lg bg-blue-600 hover:bg-blue-700 text-white transition-colors">Lưu thay đổi</button>
                </div>
            </div>
        </div>
    </div>

    <div id="drop-overlay" class="hidden fixed inset-0 z-[95] bg-blue-600/10 backdrop-blur-[1px]">
        <div class="absolute inset-0 border-[3px] border-dashed border-blue-500 rounded-2xl m-3 md:m-6"></div>
        <div class="absolute top-4 left-1/2 -translate-x-1/2 bg-white border border-blue-200 text-blue-700 px-4 py-2 rounded-xl shadow-lg text-sm font-semibold">
            Thả file vào đây để tải lên Cloud. Trình duyệt sẽ không mở tab mới.
        </div>
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="bg-white/95 border border-blue-200 rounded-2xl px-6 py-5 shadow-2xl text-center">
                <div class="text-blue-600 text-3xl mb-2"><i class="fas fa-cloud-arrow-up"></i></div>
                <div class="text-gray-700 font-bold text-base md:text-lg">Thả để tải file</div>
                <div class="text-gray-400 text-xs mt-1">Hỗ trợ kéo nhiều file cùng lúc</div>
            </div>
        </div>
    </div>

    <div id="upload-progress-toast" class="hidden fixed left-1/2 -translate-x-1/2 bottom-4 z-[96] w-[min(92vw,560px)] rounded-2xl border border-blue-200 bg-white/95 backdrop-blur shadow-2xl px-4 py-3">
        <div class="flex items-center justify-between gap-3 mb-2">
            <div id="upload-progress-label" class="text-sm font-semibold text-gray-700 truncate">Đang tải lên...</div>
            <div id="upload-progress-percent" class="text-sm font-bold text-blue-600">0%</div>
        </div>
        <div class="w-full h-2 rounded-full bg-gray-200 overflow-hidden">
            <div id="upload-progress-bar" class="h-2 rounded-full bg-blue-500 transition-all" style="width:0%"></div>
        </div>
    </div>
