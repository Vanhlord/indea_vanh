<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Translator - For Big Boss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    <link rel="stylesheet" href="/html/shared-theme.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8 border border-slate-100">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-semibold text-slate-800 tracking-tight">Trình biên dịch</h1>
            <p class="text-slate-400 mt-2 text-sm">A001</p>
        </div>

        <div class="space-y-6">
            <div>
                <label id="inputLabel" class="block text-xs font-medium text-slate-500 uppercase tracking-wider mb-2 ml-1">Văn bản</label>
                <textarea id="input" rows="4" 
                    class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-slate-200 transition-all outline-none text-slate-700 placeholder-slate-300"
                    placeholder="Nhập chữ hoặc 0101..."></textarea>
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <div id="imageSelectArea" class="hidden">
                    <button id="chooseImageBtn" type="button" onclick="imageInput.click()" class="w-full py-8 border-2 border-dashed border-slate-200 rounded-3xl text-slate-400 hover:border-blue-400 hover:bg-blue-50/50 transition-all flex flex-col items-center justify-center gap-3 relative overflow-hidden group">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        <span class="text-xs font-medium uppercase tracking-wider">Chọn hoặc kéo thả ảnh</span>
                    </button>
                    <div id="secretTextInputContainer" class="mt-4 hidden animate-in fade-in slide-in-from-top-2 duration-300">
                        <label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Văn bản bí mật (tùy chọn)</label>
                        <input type="text" id="secretTextInput" placeholder="Nhập tin nhắn cần giấu vào ảnh..." class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-400 transition-all placeholder:text-slate-300">
                    </div>
                </div>
            </div>

            <div class="relative">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-wider mb-2 ml-1">Tùy chọn dịch</label>
                <button id="modeButton" type="button" class="w-full bg-white border border-slate-200 text-slate-700 py-4 px-4 rounded-2xl font-medium hover:bg-slate-50 transition-all text-left">
                    Nhị phân
                </button>
                <div id="modeMenu" class="hidden absolute z-10 mt-2 w-full max-h-72 overflow-y-auto bg-white border border-slate-200 rounded-2xl shadow-lg">
                    <button type="button" class="mode-option w-full text-left px-4 py-3 hover:bg-slate-50 text-slate-700" data-type="binary">Nhị phân</button>
                    <button type="button" class="mode-option w-full text-left px-4 py-3 hover:bg-slate-50 text-slate-700" data-type="morse">Morse</button>
                    <button type="button" class="mode-option w-full text-left px-4 py-3 hover:bg-slate-50 text-slate-700" data-type="base64">Base64</button>
                    <button type="button" class="mode-option w-full text-left px-4 py-3 hover:bg-slate-50 text-slate-700" data-type="hex">Hex</button>
                    <button type="button" class="mode-option w-full text-left px-4 py-3 hover:bg-slate-50 text-slate-700" data-type="octal">Octal</button>
                    <button type="button" class="mode-option w-full text-left px-4 py-3 hover:bg-slate-50 text-slate-700" data-type="url">URL Encode</button>
                    <button type="button" class="mode-option w-full text-left px-4 py-3 hover:bg-slate-50 text-slate-700" data-type="htmlEntity">HTML Entity</button>
                    <button type="button" class="mode-option w-full text-left px-4 py-3 hover:bg-slate-50 text-slate-700" data-type="unicodeEscape">Unicode \\u</button>
                    <button type="button" class="mode-option w-full text-left px-4 py-3 hover:bg-slate-50 text-slate-700" data-type="embedding">Embedding Vectors</button>
                    <button type="button" class="mode-option w-full text-left px-4 py-3 hover:bg-slate-50 text-slate-700" data-type="image">Hình ảnh (0101...)</button>
                </div>
            </div>

            <div class="flex gap-3 items-center">
                <button id="reverseButton" type="button" class="shrink-0 w-12 h-12 bg-white border border-slate-200 text-slate-700 rounded-2xl hover:bg-slate-50 transition-all active:scale-95 flex items-center justify-center" title="Đảo chiều dịch" aria-label="Đảo chiều dịch">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 7h10" />
                        <path d="m14 3 4 4-4 4" />
                        <path d="M16 17H6" />
                        <path d="m10 13-4 4 4 4" />
                    </svg>
                </button>
                <button onclick="convert()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-medium hover:bg-slate-800 transition-all active:scale-95">
                    Dịch ngay
                </button>
            </div>

        <div id="resultArea">
            <div class="flex items-center justify-between mb-2">
                <label class="block text-xs font-medium text-slate-500 uppercase tracking-wider ml-1">Kết quả</label>
                <div class="flex gap-2">
                    <button id="downloadZipBtn" type="button" class="hidden text-xs font-medium text-white bg-blue-600 border border-blue-700 px-3 py-1.5 rounded-xl hover:bg-blue-700 transition-all">
                        Tải ZIP
                    </button>
                    <button id="copyButton" type="button" onclick="copyOutput()" class="text-xs font-medium text-slate-600 bg-white border border-slate-200 px-3 py-1.5 rounded-xl hover:bg-slate-50 transition-all">
                        Sao chép
                    </button>
                </div>
            </div>
            <div id="output" class="w-full min-h-[100px] p-4 bg-slate-50 rounded-2xl text-slate-600 break-all border border-dashed border-slate-200 flex flex-col items-center justify-center relative overflow-hidden">
                ...
            </div>
            <div id="secretMessageArea" class="mt-4 hidden animate-in fade-in zoom-in duration-500">
                <div class="p-4 bg-amber-50 border border-amber-100 rounded-2xl flex gap-3">
                    <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[10px] font-bold text-amber-500 uppercase tracking-widest mb-0.5">Văn bản mật:</p>
                        <p id="secretMessageDisplay" class="text-xs font-semibold text-amber-900 break-words leading-relaxed"></p>
                    </div>
                    <button onclick="copySecret()" class="self-start px-3 py-1.5 bg-amber-200 text-amber-700 text-[10px] font-bold rounded-lg hover:bg-amber-300 transition-all shrink-0">
                        Sao chép
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Raw Viewer Overlay -->
    <div id="viewerOverlay" class="fixed inset-0 z-50 bg-slate-900/95 hidden backdrop-blur-sm flex flex-col p-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h3 id="viewerTitle" class="text-white font-semibold text-lg">Xem nội dung</h3>
                <p id="viewerSubtitle" class="text-slate-400 text-xs">Raw</p>
            </div>
            <button onclick="closeViewer()" class="w-10 h-10 bg-white/10 text-white rounded-full hover:bg-white/20 transition-all flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div id="viewerContent" class="flex-1 bg-white/5 rounded-3xl overflow-auto p-8 text-slate-200 font-mono text-sm break-all selection:bg-blue-500/30">
            <!-- Content inject here -->
        </div>
    </div>

        <div class="mt-10 text-center text-slate-300 text-xs">
            By Vanh Lord
        </div>
    </div>

        <script src="/html/shared-sidebar.js"></script>

<script src="/html/js/biendich.js"></script>
</body>
</html>
