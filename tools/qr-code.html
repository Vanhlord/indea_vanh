            <div id="scanControls" class="w-full max-w-md mb-6">
                <div class="mt-4 grid grid-cols-2 gap-3">
                    <button id="continuousBtn" onclick="toggleContinuousScan()" class="px-4 py-3 text-sm font-bold rounded-2xl bg-gray-100 text-gray-600 active:scale-95 transition-all">

                    </button>
                    <button id="switchCameraBtn" onclick="switchCamera()" class="px-4 py-3 text-sm font-bold rounded-2xl bg-gray-100 text-gray-600 active:scale-95 transition-all">
                        Đổi camera
                    </button>
                </div>
                <div class="mt-3 grid grid-cols-2 gap-3">
                    <button id="torchBtn" onclick="toggleTorch()" class="px-4 py-3 text-sm font-bold rounded-2xl bg-gray-100 text-gray-600 active:scale-95 transition-all">
                        Đèn: Tắt
                    </button>
                    <label for="imageInput" class="px-4 py-3 text-sm font-bold rounded-2xl bg-gray-100 text-gray-600 active:scale-95 transition-all text-center cursor-pointer select-none">
                        Quét từ ảnh
                    </label>
                </div>
            </div>

                    </div>

                </button>
            </div>
        </div>
    </div>
