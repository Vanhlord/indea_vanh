<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="/photos/server-icon/icon-server.png">
    <link rel="apple-touch-icon" href="/photos/server-icon/icon-server.png">
    <title>QR Scanner & Creator | MC Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        #reader { border: none !important; width: 100% !important; }
        #reader video { border-radius: 24px; object-fit: cover; }
        /* Hiệu ứng trượt Modal cho mobile */
        #modalContainer { transform: translateY(100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-active #modalContainer { transform: translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
</style>
    <link rel="stylesheet" href="/html/shared-theme.css">
</head>
<body class="bg-[#f4f7f6] text-[#333] flex flex-col h-screen overflow-hidden">

    <!-- Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black/50 z-[1000] hidden" onclick="toggleSidebar()"></div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <div id="sidebar" class="fixed lg:relative w-[260px] bg-white h-full border-r border-gray-200 transition-all duration-300 z-[1001] -left-[260px] lg:left-0 flex flex-col">
        <!-- Header -->
        <div class="flex items-center gap-3 p-6 pb-4 border-b border-gray-100">
            <div class="w-10 h-10 bg-[#007bff] rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-100">
                <i class="fas fa-server text-xl"></i>
            </div>
            <span class="text-xl font-bold tracking-tight">MC Note</span>
        </div>

        <!-- Scrollable Navigation -->
        <nav class="flex-1 overflow-y-auto p-6 space-y-2">
            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-3">Hệ thống</div>
            <div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#007bff] hover:text-white transition-all text-gray-600 font-medium" onclick="window.location.href='https://vanhmcpe.top'">
                <i class="fas fa-home"></i> Trang chủ
            </div>
            <div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#007bff] hover:text-white transition-all text-gray-600 font-medium" onclick="copyIP()">
                <i class="fas fa-copy"></i> Copy IP
            </div>
            <div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#007bff] hover:text-white transition-all text-gray-600 font-medium" onclick="window.location.href='../html/status-server.html'">
                <i class="fas fa-chart-line w-5"></i> Status server
            </div>

            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-3 mt-2">Tiện ích</div>
            <div class="tool-grid-sidebar">
                <a class="tool-tile" href="/p/snapsave.html">
                    <i class="fa-brands fa-facebook-f"></i>
                    <span>Facebook</span>
                </a>
                <a class="tool-tile" href="/html/tiktok.html">
                    <i class="fa-brands fa-tiktok"></i>
                    <span>TikTok</span>
                </a>
                <a class="tool-tile" href="/html/youtube.html">
                    <i class="fa-brands fa-youtube"></i>
                    <span>YouTube</span>
                </a>
                
                <a class="tool-tile" href="/html/dowloadmc.html">
                    <i class="fas fa-download"></i>
                    <span>Minecraft</span>
                </a>
            </div>
            <h2>Công cụ</h2>
            <a class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#007bff] hover:text-white transition-all text-gray-600 font-medium" href="/p/kho.html">
                <i class="fas fa-toolbox"></i> Kho công cụ
            </a>
        </nav>

        <!-- Footer -->
        <div class="p-6 pt-4 border-t border-gray-100">
            <p class="text-xs text-gray-400 text-center font-medium">© 2026 MC Note</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <div class="p-4 border-b border-gray-200 bg-white flex justify-center items-center relative">
            <button onclick="toggleSidebar()" class="hamburger text-2xl text-gray-700 absolute left-4 lg:hidden">
                <i class="fas fa-bars"></i>
            </button>
            <div class="bg-white rounded-full px-4 py-2 shadow-lg border border-gray-200 flex items-center gap-2">
                <i class="fas fa-clock text-gray-600"></i>
                <span class="text-sm font-medium text-gray-700" id="currentTime">--:--:--</span>
            </div>
        </div>

        <!-- Content=============================================================================================================================================================== -->
        <div class="flex-1 overflow-y-auto p-4 pb-44 flex flex-col items-center no-scrollbar">
            <div class="w-full max-w-md mt-2 mb-6">
                <h1 class="text-2xl font-black text-gray-800 tracking-tight">QR Scanner</h1>
                <p class="text-sm text-gray-400">Đưa camera vào mã để quét!</p>
            </div>

            <div class="w-full max-w-md bg-white p-2 rounded-[32px] shadow-sm border border-gray-100">
                <div id="reader" class="overflow-hidden rounded-[24px] bg-gray-50"></div>
            </div>

            <div id="scanControls" class="w-full max-w-md mb-6">
                <div class="mt-4 grid grid-cols-2 gap-3">
                    <button id="continuousBtn" onclick="toggleContinuousScan()" class="px-4 py-3 text-sm font-bold rounded-2xl bg-gray-100 text-gray-600 active:scale-95 transition-all">
                        Quét liên tục: Tắt
                    </button>
                    <button id="switchCameraBtn" onclick="switchCamera()" class="px-4 py-3 text-sm font-bold rounded-2xl bg-gray-100 text-gray-600 active:scale-95 transition-all">
                        Đổi camera
                    </button>
                </div>
                <div class="mt-3 grid grid-cols-2 gap-3">
                    <button id="torchBtn" onclick="toggleTorch()" class="px-4 py-3 text-sm font-bold rounded-2xl bg-gray-100 text-gray-600 active:scale-95 transition-all">
                        Đèn: Tắt
                    </button>
                    <label for="imageInput" class="px-4 py-3 text-sm font-bold rounded-2xl bg-gray-100 text-gray-600 active:scale-95 transition-all text-center cursor-pointer select-none">
                        Quét từ ảnh
                    </label>
                </div>
            </div>

            <div id="result" class="mt-6 w-full max-w-md bg-white p-5 rounded-[28px] border-l-8 border-green-500 shadow-xl hidden animate-pulse-once">
                <div class="flex items-start justify-between mb-3 gap-3">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nội dung quét được</span>
                        <span id="qr-type" class="text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-full bg-gray-100 text-gray-500">TEXT</span>
                    </div>
                    <button onclick="copyResult()" class="text-[#007bff] text-xs font-bold px-3 py-1 bg-blue-50 rounded-full active:scale-90 transition-transform">Copy</button>
                </div>
                <p id="qr-text" class="text-gray-700 font-semibold break-all bg-gray-50 p-4 rounded-2xl border border-gray-100"></p>
                <button id="open-link-btn" onclick="openScannedLink()" class="w-full mt-4 py-4 text-sm font-bold text-white bg-emerald-500 rounded-2xl shadow-lg shadow-emerald-200 active:scale-95 transition-all hidden">
                    Mở link
                </button>
                <button onclick="location.reload()" class="w-full mt-4 py-4 text-sm font-bold text-gray-500 bg-gray-100 rounded-2xl active:bg-gray-200 transition-colors">Quét mã khác</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-gray-100 p-5 pb-8 flex justify-center gap-3 z-[1000]">
        <button onclick="openModal()" class="flex-1 max-w-[220px] flex items-center justify-center gap-2 py-4 bg-[#007bff] text-white rounded-[22px] font-bold shadow-xl shadow-blue-200 active:scale-95 transition-all">
            <i class="fas fa-plus-circle text-lg"></i> Tạo mã QR
        </button>
        <button onclick="openHistory()" class="w-14 h-14 flex items-center justify-center bg-gray-50 border border-gray-200 text-gray-400 rounded-[22px] active:bg-gray-100">
            <i class="fas fa-history text-lg"></i>
        </button>
    </div>

    <div id="qrModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] hidden items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[32px] sm:rounded-[32px] p-6 shadow-2xl" id="modalContainer">

            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="text-xl font-extrabold text-gray-800" id="modalTitle">Chọn loại mã QR</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-400">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div id="qrMenu" class="grid grid-cols-1 gap-3 mb-4">
                <button onclick="showInput('wifi')" class="flex items-center gap-4 p-4 bg-blue-50 hover:bg-blue-100 rounded-[24px] transition-all group">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-blue-500 shadow-sm"><i class="fas fa-wifi"></i></div>
                    <div class="text-left"><div class="font-bold text-gray-800">Kết nối Wifi</div><div class="text-[11px] text-gray-400">Tự động kết nối mạng</div></div>
                    <i class="fas fa-chevron-right ml-auto text-gray-300"></i>
                </button>
                <button onclick="showInput('link')" class="flex items-center gap-4 p-4 bg-purple-50 hover:bg-purple-100 rounded-[24px] transition-all group">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-purple-500 shadow-sm"><i class="fas fa-link"></i></div>
                    <div class="text-left"><div class="font-bold text-gray-800">Link / Văn bản</div><div class="text-[11px] text-gray-400">URL hoặc tin nhắn ẩn</div></div>
                    <i class="fas fa-chevron-right ml-auto text-gray-300"></i>
                </button>
                <button disabled class="flex items-center gap-4 p-4 bg-gray-100 rounded-[24px] transition-all group opacity-50 cursor-not-allowed">
                    <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-gray-400 shadow-sm"><i class="fas fa-lock"></i></div>
                    <div class="text-left"><div class="font-bold text-gray-500">Ngân hàng</div><div class="text-[11px] text-gray-400">Tính năng đang khóa</div></div>
                    <i class="fas fa-lock ml-auto text-gray-300"></i>
                </button>
            </div>

            <div id="qrInputZone" class="hidden space-y-4">
                <div id="inputGroup" class="space-y-3"></div>
                <button onclick="generateQR()" class="w-full py-4 bg-[#007bff] text-white rounded-2xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition-all">Tạo mã ngay!</button>
                <button onclick="backToMenu()" class="w-full text-sm text-gray-400 font-medium py-2">Quay lại menu</button>
            </div>

            <div id="qrcode-canvas" class="mt-4 flex flex-col items-center justify-center bg-gray-50 p-6 rounded-[28px] border-2 border-dashed border-gray-200 hidden animate-scale-up">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-tighter">Quét Mã</p>
                </div>
            <div id="qrActions" class="mt-4 grid grid-cols-2 gap-3 hidden">
                <button id="saveQrBtn" onclick="saveGeneratedQR()" class="py-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg shadow-emerald-200 active:scale-95 transition-all">
                    Lưu mã QR
                </button>
                <button id="copyQrBtn" onclick="copyGeneratedQR()" class="py-4 bg-blue-500 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-all">
                    Sao chép ảnh
                </button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[2500] hidden items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[32px] sm:rounded-[32px] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-extrabold text-gray-800">Lịch sử quét</h3>
                <button onclick="closeHistory()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-400">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="historyList" class="space-y-3 max-h-[50vh] overflow-y-auto no-scrollbar"></div>
            <div class="grid grid-cols-2 gap-3 mt-5">
                <button onclick="clearHistory()" class="px-4 py-3 text-sm font-bold rounded-2xl bg-red-50 text-red-500 active:scale-95 transition-all">Xóa lịch sử</button>
                <button onclick="closeHistory()" class="px-4 py-3 text-sm font-bold rounded-2xl bg-gray-100 text-gray-600 active:scale-95 transition-all">Đóng</button>
            </div>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div id="customAlert" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[3000] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl scale-95 transition-all duration-300" id="alertContainer">
            <div class="text-center">
                <div id="alertIconWrap" class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i id="alertIcon" class="fas fa-exclamation-triangle text-red-500 text-2xl"></i>
                </div>
                <h3 id="alertTitle" class="text-xl font-extrabold text-gray-800 mb-2">Cảnh báo!</h3>
                <p class="text-gray-600 mb-6" id="alertMessage">Nội dung cảnh báo</p>
                <button onclick="closeAlert()" class="w-full py-4 bg-[#007bff] text-white rounded-2xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition-all">
                    Đồng ý
                </button>
            </div>
        </div>
    </div>
    <input id="imageInput" type="file" accept="image/*" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" onchange="scanFromImage(this.files[0])">
        <script src="/html/shared-sidebar.js"></script>

<script src="/html/js/qr-code.js"></script>
</body>
</html>
