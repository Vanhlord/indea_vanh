<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/photos/server-icon/icon-server.png">
    <link rel="apple-touch-icon" href="/photos/server-icon/icon-server.png">
    <title>Admin - Thêm nút tải Minecraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    <link rel="stylesheet" href="/html/shared-theme.css">
</head>
<body class="flex h-screen bg-[#f4f7f6] text-[#333] overflow-hidden">
    <div id="overlay" class="fixed inset-0 bg-black/50 z-[1000] hidden lg:hidden" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed lg:relative w-[260px] bg-white h-full border-r border-gray-200 transition-all duration-300 z-[1001] -left-[260px] lg:left-0 flex flex-col">
        <div class="flex items-center gap-3 p-6 pb-4 border-b border-gray-100">
            <div class="w-10 h-10 bg-[#007bff] rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-100">
                <i class="fas fa-server text-xl"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-800">VNA</span>
        </div>

        <nav class="flex-1 overflow-y-auto p-6 space-y-2">
            <!-- Sidebar content injected by shared-sidebar.js -->
        </nav>

        <div class="p-6 pt-4 border-t border-gray-100">
            <p class="text-xs text-gray-400 text-center font-medium">© 2026 MC Note</p>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center lg:hidden">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#007bff] rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-download text-sm"></i>
                </div>
                <span class="font-bold text-slate-700">Admin - Minecraft</span>
            </div>
            <button type="button" onclick="toggleSidebar()" class="hamburger w-10 h-10 flex items-center justify-center bg-gray-50 rounded-lg border border-gray-200">
                <i class="fas fa-bars"></i>
            </button>
        </header>

        <div class="page-content px-4 py-10 w-full">
        <div class="bg-white border border-gray-200 rounded-3xl shadow-sm p-6 sm:p-8">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-11 h-11 rounded-2xl bg-[#007bff] text-white flex items-center justify-center shadow-lg shadow-blue-100">
                    <i class="fas fa-download text-lg"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-gray-900">Thêm nút tải Minecraft</h1>
                    <p class="text-sm text-gray-500">Dữ liệu sẽ được chèn vào danh sách tải trong `html/dowloadmc.html`.</p>
                </div>
            </div>

            <form id="downloadForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Tiêu đề nút</label>
                    <input id="title" type="text" required maxlength="120"
                        class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"
                        placeholder="Ví dụ: Minecraft PE v26.0">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Phiên bản / mô tả</label>
                    <input id="version" type="text" maxlength="140"
                        class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"
                        placeholder="Ví dụ: Version 1.21.132 (datnight)">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Link tải</label>
                    <input id="url" type="text" required maxlength="500"
                        class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200"
                        placeholder="Ví dụ: https://example.com/minecraft.apk hoặc ../Minecraft/file.apk">
                    <p class="text-xs text-gray-500 mt-2">Hỗ trợ link http/https hoặc đường dẫn tương đối trong máy chủ.</p>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-sm font-semibold text-gray-700">Chọn file trong thư mục Minecraft</label>
                        <button type="button" id="refreshFiles" class="text-xs font-semibold text-blue-600 hover:text-blue-800">
                            Làm mới
                        </button>
                    </div>
                    <select id="filePicker"
                        class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-200">
                        <option value="">-- Chọn file có sẵn --</option>
                    </select>
                    <p class="text-xs text-gray-500 mt-2">Chọn file để tự điền link tải.</p>
                </div>

                <button type="submit"
                    class="w-full bg-[#007bff] hover:bg-[#0062cc] text-white font-semibold rounded-xl py-3 transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-upload"></i>
                    Tải lên
                </button>
            </form>

            <div id="statusMessage" class="mt-4 text-sm font-medium hidden"></div>

            <div class="mt-8 border-t border-gray-100 pt-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold text-gray-900">Danh sách nút tải</h2>
                    <button type="button" id="refreshList"
                        class="text-sm font-semibold text-blue-600 hover:text-blue-800">
                        Làm mới
                    </button>
                </div>
                <div id="downloadList" class="space-y-3 text-sm text-gray-500">
                    Đang tải danh sách...
                </div>
            </div>
        </div>
    </div>

    
        </div>
    </div>

    <script src="/html/shared-sidebar.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            if (!sidebar || !overlay) return;

            if (sidebar.classList.contains('-left-[260px]')) {
                sidebar.classList.remove('-left-[260px]');
                sidebar.classList.add('left-0');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-left-[260px]');
                sidebar.classList.remove('left-0');
                overlay.classList.add('hidden');
            }
        }

<script src="/html/js/p.js"></script>
