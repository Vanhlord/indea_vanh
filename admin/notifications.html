<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Thông báo hệ thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 sm:p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-8 text-white text-center">
            <i class="fas fa-paper-plane text-4xl mb-4"></i>
            <h1 class="text-3xl font-bold">Thông báo hệ thống</h1>
            <p class="text-blue-100 mt-2">Gửi thông báo đẩy đến tất cả người dùng đã đăng ký</p>
            <div id="subscriberCount" class="mt-4 inline-block bg-white/20 px-4 py-2 rounded-full text-sm font-semibold backdrop-blur-sm transition-all shadow-sm">
                <i class="fas fa-spinner fa-spin mr-2"></i>Đang tải số lượng thiết bị...
            </div>
        </div>
        
        <div class="p-8 space-y-6">
            <div id="statusMsg" class="hidden p-4 rounded-2xl text-sm font-medium"></div>

            <form id="notificationForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Tiêu đề</label>
                    <input type="text" id="title" placeholder="Nhập tiêu đề thông báo..." 
                        class="w-full px-5 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Nội dung</label>
                    <textarea id="body" rows="4" placeholder="Nhập nội dung thông báo..." 
                        class="w-full px-5 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Link ảnh (Icon 192x192 hoặc URL ảnh bất kỳ)</label>
                    <input type="url" id="icon" placeholder="https://vanhmcpe.top/photos/raw/anh-nhom/123.png" 
                        class="w-full px-5 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Link khi bấm vào (Tùy chọn)</label>
                    <input type="url" id="url" placeholder="https://vanhmcpe.top/..." 
                        class="w-full px-5 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-share-square"></i>
                        Gửi thông báo ngay
                    </button>
                </div>
            </form>
        </div>
        
        <div class="bg-gray-50 p-6 border-t border-gray-100 text-center">
            <a href="/" class="text-gray-500 hover:text-blue-600 text-sm font-medium transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>Quay lại trang chủ
            </a>
        </div>
    </div>

    <script>
        const form = document.getElementById('notificationForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');

        function showMessage(text, type) {
            statusMsg.textContent = text;
            statusMsg.className = `p-4 rounded-2xl text-sm font-medium ${type === 'success' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`;
            statusMsg.classList.remove('hidden');
            setTimeout(() => statusMsg.classList.add('hidden'), 5000);
        }

        async function fetchSubscriberCount() {
            try {
                const res = await fetch('/api/notifications/count');
                const result = await res.json();
                if (res.ok) {
                    document.getElementById('subscriberCount').innerHTML = `<i class="fas fa-users mr-2"></i>${result.count} thiết bị đã đăng ký`;
                } else {
                    document.getElementById('subscriberCount').innerHTML = `<i class="fas fa-exclamation-triangle mr-2 text-yellow-300"></i>Không thể tải số lượng`;
                }
            } catch (err) {
                console.error('Error fetching subscriber count:', err);
                document.getElementById('subscriberCount').innerHTML = `<i class="fas fa-exclamation-triangle mr-2 text-yellow-300"></i>Không thể tải số lượng`;
            }
        }

        window.addEventListener('load', fetchSubscriberCount);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                title: document.getElementById('title').value.trim(),
                body: document.getElementById('body').value.trim(),
                icon: document.getElementById('icon').value.trim(),
                url: document.getElementById('url').value.trim()
            };

            if (!data.title || !data.body) {
                showMessage('Vui lòng nhập đầy đủ tiêu đề và nội dung!', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang gửi...';

            try {
                const res = await fetch('/api/notifications/broadcast', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();
                if (res.ok) {
                    showMessage(`Đã gửi thành công đến ${result.successCount} thiết bị!`, 'success');
                    form.reset();
                } else {
                    showMessage(result.error || 'Gửi thất bại, vui lòng thử lại.', 'error');
                }
            } catch (err) {
                showMessage('Lỗi kết nối đến server!', 'error');
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-share-square"></i> Gửi thông báo ngay';
            }
        });
    </script>
</body>
</html>
