# ID của Tunnel vừa tạo (Dãy số dài loằng ngoằng ấy)
tunnel: <TUNNEL_ID>
# Đường dẫn đến file credentials (thường nằm trong thư mục người dùng)
credentials-file: C:\\Users\\<YOU>\\.cloudflared\\<TUNNEL_ID>.json

ingress:
  # Tên miền muốn dùng cho Web
  - hostname: mcnote.io.vn
    service: http://localhost:3000
    
  # (Tùy chọn) Nếu muốn chạy thêm cả Server Minecraft trên cùng Tunnel
  # - hostname: play.mcnote.io.vn
  #   service: tcp://localhost:25565

  # Quy tắc cuối cùng: Trả về 404 nếu không khớp các cái trên
  - service: http_status:404
