<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/photos/server-icon/icon-server.png">
    <link rel="apple-touch-icon" href="/photos/server-icon/icon-server.png">
    <title>Chat Console | MC Note</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #007bff; }
        #chat-box { scroll-behavior: smooth; }
        
        /* Blur effect for non-logged in users */
        .chat-blur {
            filter: blur(4px);
            pointer-events: none;
            user-select: none;
        }
        
        .login-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 50;
        }

        #sidebar.sidebar-open {
            transform: translateX(0) !important;
        }
</style>

    <link rel="stylesheet" href="/html/shared-theme.css">
</head>
<body class="bg-[#f4f7f6] text-[#333] flex h-screen sm:overflow-hidden overflow-auto">

    <div id="overlay" class="fixed inset-0 bg-black/50 z-[1000] hidden lg:hidden" onclick="closeSidebar()"></div>

    <div id="sidebar" class="fixed lg:relative w-[260px] bg-white h-full border-r border-gray-200 transition-all duration-300 z-[1001] flex flex-col lg:translate-x-0 -translate-x-full">
        
        <!-- Header -->
        <div class="flex items-center gap-3 p-6 pb-4 border-b border-gray-100">
            <div class="w-10 h-10 bg-[#007bff] rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-100">
                <i class="fas fa-server text-xl"></i>
            </div>
            <span class="text-xl font-bold tracking-tight">NexusBD</span>
        </div>

        <!-- Scrollable Navigation -->

        <nav class="flex-1 overflow-y-auto p-6 space-y-2">
            <!-- Hệ thống -->
            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-3">Hệ thống</div>
            <div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#007bff] hover:text-white transition-all text-gray-600 font-medium" onclick="window.location.href='../html/index.html'">
                <i class="fas fa-home"></i> Trang chủ
            </div>
            <div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#007bff] hover:text-white transition-all text-gray-600 font-medium" onclick="window.location.href='../html/index.html'; setTimeout(() => { if(typeof copyIP === 'function') copyIP(); }, 100);">
                <i class="fas fa-copy"></i> Copy IP
            </div>
            <div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#007bff] hover:text-white transition-all text-gray-600 font-medium" onclick="window.location.href='../html/status-server.html'">
                <i class="fas fa-chart-line w-5"></i> Status server
            </div>
            <div class="flex items-center gap-3 p-3 rounded-xl bg-[#007bff] text-white font-medium shadow-lg shadow-blue-100">
                <i class="fas fa-comments w-5"></i> Chat
            </div>
<a class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#007bff] hover:text-white transition-all text-gray-600 font-medium" href="/cloud">
                <i class="fas fa-cloud w-5"></i> Cloud</a>
                
            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-3">Thư viện</div>
                <a class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#007bff] hover:text-white transition-all text-gray-600 font-medium" href="/p/rawphoto.html">
                    <i class="fas fa-expand"></i> Album
                </a>

            <!-- Tiện ích -->
            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-3 mt-2">Tiện ích</div>
            <div class="tool-grid-sidebar">
                <a class="tool-tile" href="/p/snapsave.html">
                    <i class="fa-brands fa-facebook-f"></i>
                    <span>Facebook</span>
                </a>
                <a class="tool-tile" href="/html/tiktok.html">
                    <i class="fa-brands fa-tiktok"></i>
                    <span>TikTok</span>
                </a>
                <a class="tool-tile" href="/html/youtube.html">
                    <i class="fa-brands fa-youtube"></i>
                    <span>YouTube</span>
                </a>
                <a class="tool-tile" href="/html/soundcloud.html">
                    <i class="fa-brands fa-soundcloud"></i>
                    <span>SoundCloud</span>
                </a>
                <a class="tool-tile" href="/html/dowloadmc.html">
                    <i class="fas fa-download"></i>
                    <span>Minecraft</span>
                </a>
            </div>
            <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 px-3 mt-4">kho rác</div>
            <a class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#007bff] hover:text-white transition-all text-gray-600 font-medium" href="/p/kho.html">
                <i class="fas fa-toolbox"></i> Kho công cụ
            </a>
        </nav>

        <!-- Footer -->
        <div class="p-6 pt-4 border-t border-gray-100">
            <p class="text-xs text-gray-400 text-center font-medium">© 2026 NexusBD</p>
        </div>
    </div>


    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center">
            <button id="menu-toggle" type="button" onclick="toggleSidebar()" class="text-gray-500 text-xl cursor-pointer lg:hidden">
                <i class="fas fa-bars"></i>
            </button>
            
            <!-- User Profile Section - Desktop & Mobile -->
            <div id="userProfile" class="flex items-center gap-3 ml-auto">

                <!-- Guest State -->
                <div class="bg-white rounded-full px-4 py-2 shadow-lg border border-gray-200 flex items-center gap-3 cursor-pointer hover:bg-gray-50 transition-colors" id="userGuest" onclick="window.location.href='/api/auth/discord'">
                    <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                    <span class="text-sm font-medium text-gray-700">Đăng nhập</span>
                </div>
                <!-- Logged In State -->
                <div class="bg-white rounded-full px-4 py-2 shadow-lg border border-gray-200 flex items-center gap-3 hidden" id="userLogged">
                    <img src="" id="userAvatar" class="w-8 h-8 rounded-full border-2 border-[#007bff]" alt="Avatar">
                    <span class="text-sm font-medium text-gray-700" id="userName">User</span>
                    <button onclick="logout()" class="text-red-500 hover:text-red-700 ml-2">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </header>


        <main class="flex-1 flex flex-col p-4 lg:p-10 sm:overflow-hidden overflow-auto">

            <div class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-gray-50 bg-gray-50/50 flex justify-between items-center">
                    <span class="font-bold text-gray-600"><i class="fas fa-circle text-green-500 text-[10px] mr-2"></i> Trực tuyến</span>
                    <span class="text-xs text-gray-400">Bedrock Bridge</span>
                </div>
                
                <div id="chat-container" class="flex-1 relative overflow-hidden bg-white">
                    <!-- Login overlay for non-logged in users -->
                    <div id="loginOverlay" class="login-overlay hidden">
                        <i class="fas fa-lock text-4xl text-[#007bff] mb-3"></i>
                        <h3 class="font-bold text-gray-800 mb-2">Vui lòng đăng nhập</h3>
                        <p class="text-sm text-gray-500 mb-4">Đăng nhập để tham gia trò chuyện</p>
                        <button onclick="window.location.href='/api/auth/discord'" class="bg-[#007bff] text-white px-6 py-2 rounded-xl font-bold hover:shadow-lg transition-all">
                            <i class="fa-brands fa-discord mr-2"></i>Đăng nhập Discord
                        </button>
                    </div>
                    
                    <div id="chat-box" class="h-full overflow-y-auto p-4 space-y-4">
                    </div>
                </div>

                <div id="chat-input-area" class="p-2 sm:p-4 bg-gray-50 border-t border-gray-100 chat-blur">

                    <div class="flex gap-2 sm:gap-3 max-w-4xl mx-auto">

                        <input id="user" type="text" value="Use" class="w-24 p-3 rounded-xl border border-gray-200 outline-none text-center font-bold text-[#007bff] bg-white hidden">
                        <input id="msg" type="text" placeholder="Gửi tin nhắn..." class="flex-1 p-2 sm:p-3 text-sm sm:text-base rounded-xl border border-gray-200 outline-none focus:border-[#007bff] transition-all bg-white">
                        <button onclick="send()" class="bg-[#007bff] text-white px-3 sm:px-6 py-2 sm:py-3 text-sm sm:text-base rounded-xl font-bold hover:shadow-lg hover:shadow-blue-200 transition-all active:scale-95 whitespace-nowrap">
                            GỬI
                        </button>
                    </div>
                </div>


            </div>
        </main>
    </div>
    <script src="/socket.io/socket.io.js"></script>
        <script src="/html/shared-sidebar.js"></script>
<script>
const socket = io();
        const box = document.getElementById('chat-box');
        const inputMsg = document.getElementById('msg');
        const userInput = document.getElementById('user');
        let currentUser = userInput.value;

        // Check login status on load
        async function checkLoginStatus() {
            try {
                const res = await fetch('/api/user-info');
                const data = await res.json();
                
                if (data.loggedIn && data.username) {
                    // Update UI for logged in user
                    document.getElementById('userGuest').classList.add('hidden');
                    document.getElementById('userLogged').classList.remove('hidden');
                    document.getElementById('userName').textContent = data.username;
                    document.getElementById('userAvatar').src = data.avatar;
                    
                    // Set username for chat
                    userInput.value = data.username;
                    currentUser = data.username;
                    
                    // Remove blur effect - user is logged in
                    document.getElementById('chat-box').classList.remove('chat-blur');
                    document.getElementById('chat-input-area').classList.remove('chat-blur');
                    document.getElementById('loginOverlay').classList.add('hidden');
                    
                } else {
                    // Guest mode - show default
                    document.getElementById('userGuest').classList.remove('hidden');
                    document.getElementById('userLogged').classList.add('hidden');
                    
                    // Add blur effect - user not logged in
                    document.getElementById('chat-box').classList.add('chat-blur');
                    document.getElementById('chat-input-area').classList.add('chat-blur');
                    document.getElementById('loginOverlay').classList.remove('hidden');
                }

            } catch (e) {
                console.error("Error checking login:", e);
            }
        }


        // Logout function
        function logout() {
            if (confirm('Muốn đăng xuất rồi à!')) {
                window.location.href = '/api/auth/logout';
            }
        }

        // Check login on page load
        checkLoginStatus();


        // Function to render a single message
        function renderMessage(data) {
            const isMe = data.user === currentUser;
            const div = document.createElement('div');
            
            // Parse Minecraft message format: "[timestamp] [icon] [rank] [device] username >> message"
            let headerText = isMe ? 'BẠN' : data.user;
            let messageText = data.text;
            
            if (data.text && data.text.includes('>>')) {
                const parts = data.text.split('>>');
                headerText = parts[0].trim();
                messageText = parts.slice(1).join('>>').trim();
            }

            const safeHeader = escapeHtml(headerText);
            const safeMessage = escapeHtml(messageText);
            
            if (isMe) {
                div.className = 'flex flex-col items-end animate-fade-in';
                div.innerHTML = `
                    <span class="text-[10px] font-bold text-[#007bff] mr-2 mb-1 uppercase">${safeHeader}</span>
                    <div class="bg-[#007bff] text-white p-3 px-4 rounded-2xl rounded-tr-none text-[14px] max-w-[80%] shadow-md">
                        ${safeMessage}
                    </div>
                `;
            } else {
                div.className = 'flex flex-col items-start animate-fade-in';
                div.innerHTML = `
                    <span class="text-[10px] font-bold text-gray-400 ml-2 mb-1 uppercase">${safeHeader}</span>
                    <div class="bg-gray-100 p-3 px-4 rounded-2xl rounded-tl-none text-[14px] text-gray-700 max-w-[80%] shadow-sm">
                        ${safeMessage}
                    </div>
                `;
            }
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // Load chat history when connecting
        socket.on('chat-history', (history) => {
            // Clear existing messages
            box.innerHTML = '';
            // Only show last 50 messages to save RAM
            const recentMessages = history.slice(-50);
            // Render each message from history
            recentMessages.forEach(msg => {
                renderMessage(msg);
            });
        });


        socket.on('mc-chat', (data) => {
            renderMessage(data);
        });

        socket.on('chat-error', (payload) => {
            const message = payload?.message || 'Không thể gửi tin nhắn.';
            alert(message);
        });

        function send() {
            if (!document.getElementById('userLogged') || document.getElementById('userLogged').classList.contains('hidden')) {
                alert('Bạn cần đăng nhập để gửi tin nhắn.');
                return;
            }
            const user = userInput.value;
            const content = inputMsg.value.trim();
            if (content) {
                socket.emit('send-to-game', { user, content });
                inputMsg.value = '';
            }
        }

        function escapeHtml(value) {
            const div = document.createElement('div');
            div.textContent = String(value || '');
            return div.innerHTML;
        }

        inputMsg.addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });

        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        function openSidebar() {
            if (!sidebar || !overlay) return;
            sidebar.classList.add('sidebar-open');
            overlay.classList.remove('hidden');
        }

        function closeSidebar() {
            if (!sidebar || !overlay) return;
            sidebar.classList.remove('sidebar-open');
            overlay.classList.add('hidden');
        }

        function toggleSidebar() {
            if (!sidebar) return;
            if (sidebar.classList.contains('sidebar-open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        }

        document.addEventListener('click', function(e) {
            if (window.innerWidth >= 1024) return;
            if (!sidebar || !menuToggle) return;
            const isOpen = sidebar.classList.contains('sidebar-open');
            if (!isOpen) return;
            if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
                closeSidebar();
            }
        });

        const sidebarLinks = document.querySelectorAll('#sidebar nav a, #sidebar nav div[onclick]');
        sidebarLinks.forEach((link) => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 1024) closeSidebar();
            });
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) closeSidebar();
        });
    </script>
</body>
</html>
